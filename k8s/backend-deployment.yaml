apiVersion: apps/v1
kind: Deployment
metadata:
  name: wezu-backend
  labels:
    app: wezu-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wezu-backend
  template:
    metadata:
      labels:
        app: wezu-backend
    spec:
      containers:
      - name: backend
        image: your-repo/wezu-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: wezu-backend-service
spec:
  selector:
    app: wezu-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
