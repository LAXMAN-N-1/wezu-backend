apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wezu-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - api1.powerfrill.com
    secretName: api1-powerfrill-tls
  rules:
  - host: api1.powerfrill.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wezu-backend-service
            port:
              number: 80
