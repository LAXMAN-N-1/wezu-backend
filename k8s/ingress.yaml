apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wezu-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
  - host: api.wezu.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wezu-backend-service
            port:
              number: 80
