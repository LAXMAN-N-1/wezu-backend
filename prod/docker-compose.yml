version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    command: [ "postgres", "-c", "shared_preload_libraries=timescaledb" ]
    container_name: wezu_postgres_prod
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-wezu_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-wezu_pass}
      - POSTGRES_DB=${POSTGRES_DB:-wezu_db}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U wezu_user" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wezu_redis_prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    container_name: wezu_mqtt_prod
    restart: unless-stopped
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    healthcheck:
      test: [ "CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 | grep -v Error || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: wezu_backend_prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-wezu_user}:${POSTGRES_PASSWORD:-wezu_pass}@db:5432/${POSTGRES_DB:-wezu_db}
      - REDIS_URL=redis://redis:6379/0
      - MQTT_BROKER_URL=mqtt://mqtt:1883
      - ENVIRONMENT=production
      - DEBUG=false
    volumes:
      - uploads:/app/uploads

  nginx:
    image: nginx:alpine
    container_name: wezu_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  uploads:
