          SECRET_KEY=test_secret_for_ci_only python3.11 -m pytest -q tests/test_route_collisions.py
    acceptance_criteria:
      - "tests/test_route_collisions.py passes."
      - "Any future PR introducing a duplicate route will fail CI."
    rollout_strategy: "Add to CI pipeline as a required check."
    rollback_strategy: "Remove test file. No runtime impact."
