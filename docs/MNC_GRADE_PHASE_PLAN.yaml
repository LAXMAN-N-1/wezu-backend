        rules:
          - "Each schema defines explicit fields with types and validators."
          - "Use Field(min_length=, max_length=, ge=, le=) for boundary constraints."
          - "Sensitive fields (passwords) use SecretStr or constrained str."
      - task_id: P4-B-2
        description: >
          Replace `param: dict` with `param: NewSchema` in each route handler.
          Update handler body to access schema attributes instead of dict keys.
        action: replace_dict_params
      - task_id: P4-B-3
        description: >
          Create tests/test_input_contracts.py — AST-based CI guard that
          scans all route files for parameters typed as bare `dict`.
          Fails if any POST/PUT/PATCH handler accepts `dict` body params.
        file: tests/test_input_contracts.py
        action: create
    db_migration_impact: none
    test_tasks:
      - type: unit
        description: "Run input contract CI guard."
      - type: unit
        description: "Test that each new schema rejects invalid input (missing fields, wrong types)."
    acceptance_criteria:
      - "Zero route handlers accept bare `dict` as body parameter."
      - "OpenAPI spec shows typed schemas for all endpoints."
      - "CI guard prevents future untyped inputs."
    rollout_strategy: "Deploy to staging. Verify front-end clients send matching payloads."
    rollback_strategy: "Revert schema + handler changes. Dict params are functional but unvalidated."
    risk_controls:
      - "Schema validation may reject previously-accepted malformed payloads — test with real client data."
      - "Add Optional fields for backward compat where needed."

  # ─────────────────────────────────────────────────────────────────────────
  # P4-C: Structured Logging Normalization (structlog)
  # ─────────────────────────────────────────────────────────────────────────
  - phase_id: P4-C
    status: completed
    completed_at: "2025-07-25"
    objective: >
      Standardize logging across all service files from stdlib `logging`
      to `structlog` for consistent structured JSON output, request
      correlation, and machine-parseable log aggregation.
    risk_level: P3
    estimated_effort: "3–4 hours"
    file_scope:
      - app/services/wallet_service.py
      - app/services/rental_service.py
      - app/services/auth_service.py
      - app/services/settlement_service.py
      - app/services/kyc_service.py
      - app/services/notification_service.py
      - app/services/payment_service.py
      - app/core/logging.py
      - tests/test_structured_logging.py  # NEW
    code_tasks:
      - task_id: P4-C-1
        description: >
          In each service file, replace:
            import logging
            logger = logging.getLogger(__name__)
          with:
            from app.core.logging import get_logger
            logger = get_logger(__name__)
          This switches to structlog while preserving the logger API.
          Priority: the 7 critical service files listed in file_scope.
        action: migrate_loggers
      - task_id: P4-C-2
        description: >
          Upgrade key log calls in critical services to use structured
          context (key-value pairs) instead of f-strings:
            BEFORE: logger.info(f"Wallet credited {amount} for user {user_id}")
            AFTER:  logger.info("wallet.credited", amount=amount, user_id=user_id)
          Priority: wallet_service.py, rental_service.py, auth_service.py,
          settlement_service.py.
        action: upgrade_log_calls
      - task_id: P4-C-3
        description: >
          Create tests/test_structured_logging.py — CI guard that:
          1) Scans critical service files for `import logging` (should be 0).
          2) Warns on f-string log messages in service layer (advisory).
        file: tests/test_structured_logging.py
        action: create
    db_migration_impact: none
    test_tasks:
      - type: unit
        description: "Run structured logging CI guard."
      - type: integration
        description: "Trigger a wallet operation; verify log output contains structured fields."
    acceptance_criteria:
      - "Critical service files use structlog via get_logger()."
      - "Key log lines use structured key-value context."
      - "CI guard flags stdlib logging imports in service files."
    rollout_strategy: "Deploy to staging. Verify log aggregator parses structured output."
    rollback_strategy: "Revert. stdlib logging still works; no runtime impact."
    risk_controls:
      - "structlog wraps stdlib; existing log handlers continue to work."
      - "Incremental migration — non-critical files can migrate later."

  # ─────────────────────────────────────────────────────────────────────────
  # P5-A: Exception Hygiene – Replace bare except-Exception with typed catches
  # ─────────────────────────────────────────────────────────────────────────
  - phase_id: P5-A
    status: not-started
    objective: >
      Replace broad 'except Exception' catches in route handlers with
      specific exception types (ValueError, HTTPException, SQLAlchemyError).
      This prevents silent error swallowing, improves debuggability, and
      ensures unexpected errors propagate to the global error handler
      (hardened in P4-A).  Focus on the top-10 worst offender route files
      first (54 catches across 31 files in app/api/).
    priority: P2
    estimated_hours: 6-8
    dependencies: [P4-C]
    scope:
      target_files:
        - app/api/v1/orders.py              # 9 bare catches
        - app/api/v1/orders_realtime.py      # 6 bare catches
        - app/api/v1/dealer_portal_auth.py   # 4 bare catches
        - app/api/v1/dealer_portal_customers.py  # 3 bare catches
        - app/api/v1/customer_auth.py        # 3 bare catches
        - app/api/v1/auth.py                 # 3 bare catches
        - app/api/v1/admin/users.py          # 3 bare catches
        - app/api/v1/dealer_stations.py      # 2 bare catches
        - app/api/v1/dealer_portal_dashboard.py  # 2 bare catches
        - app/api/v1/dealer_kyc.py           # 2 bare catches
      tasks:
        - task_id: P5-A-1
          title: "Replace bare except-Exception in top-10 route files"
          description: >
            For each 'except Exception as e' block:
            1) Identify what exceptions the try block can actually raise.
            2) Replace with specific types (ValueError, IntegrityError, etc.).
            3) Let truly unexpected exceptions propagate to error_handler middleware.
            4) Keep logger.exception() for ops visibility.
          action: refactor
        - task_id: P5-A-2
          title: "CI guard – bare-except scanner"
          description: >
            AST-based test that scans app/api/ for 'except Exception' without
            a preceding specific catch.  Starts with an allowlist for existing
            catches outside top-10, shrink allowlist over time.
          file: tests/test_exception_hygiene.py
          action: create
    db_migration_impact: none
    test_tasks:
      - type: unit
        description: "Run exception hygiene CI guard."
    acceptance_criteria:
      - "Top-10 route files have zero bare 'except Exception' catches."
      - "CI guard test passes with shrinking allowlist."
      - "No silent error swallowing in critical flows."
    rollout_strategy: "Incremental per-file refactor. Run full test suite after each file."
    rollback_strategy: "Revert individual files; global error handler still catches everything."
    risk_controls:
      - "P4-A error handler is the safety net — unexpected exceptions get logged + generic 500."
      - "Allowlist mechanism prevents CI breakage during incremental migration."

  # ─────────────────────────────────────────────────────────────────────────
  # P5-B: db.commit Extraction – Move commits from routes to service layer
  # ─────────────────────────────────────────────────────────────────────────
  - phase_id: P5-B
    status: not-started
    objective: >
      Extract db.commit() calls from route handlers into the service layer.
      Routes should be thin orchestrators; persistence belongs in services.
      This enables proper unit testing of services (mock DB), transactional
      boundaries per business operation, and future UoW pattern adoption.
      263 db.commit() calls exist in app/api/ across ~50 files.
      Focus on the top-10 worst offenders first.
    priority: P3
    estimated_hours: 10-14
    dependencies: [P5-A]
    scope:
      target_files:
        - app/api/v1/admin_rbac.py           # 20 commits
        - app/api/v1/auth.py                 # 18 commits
        - app/api/admin/cms.py               # 15 commits
        - app/api/v1/dealer_portal_auth.py   # 11 commits
        - app/api/v1/users.py                # 10 commits
        - app/api/v1/dealer_portal_users.py  # 10 commits
        - app/api/admin/stations.py          # 10 commits
        - app/api/v1/profile.py              # 9 commits
        - app/api/v1/dealer_portal_settings.py  # 9 commits
        - app/api/v1/dealer_portal_roles.py  # 8 commits
      tasks:
        - task_id: P5-B-1
          title: "Extract db.commit from top-10 route files into services"
          description: >
            For each route handler with db.commit():
            1) Identify the corresponding service method (or create one).
            2) Move the commit into the service method.
            3) Route handler calls service and returns result.
            4) If no service exists, create a thin wrapper in the appropriate service.
          action: refactor
        - task_id: P5-B-2
          title: "CI guard – db.commit-in-routes scanner"
          description: >
            AST-based test that scans route files for db.commit() calls.
            Starts with allowlist for files not yet migrated; shrink over time.
          file: tests/test_route_commit_hygiene.py
          action: create
    db_migration_impact: none
    test_tasks:
      - type: unit
        description: "Run route commit hygiene CI guard."
    acceptance_criteria:
      - "Top-10 route files have zero db.commit() calls."
      - "All moved commits live in service methods."
      - "CI guard test passes with shrinking allowlist."
    rollout_strategy: "Incremental per-file refactor. Service-layer tests validate behavior."
    rollback_strategy: "Revert individual files; commits in routes still work."
    risk_controls:
      - "Each file is migrated and tested independently."
      - "Allowlist prevents CI breakage during incremental migration."
      - "Integration tests catch transactional boundary errors."

  # ─────────────────────────────────────────────────────────────────────────
  # P5-C: Response Model Coverage – Add response_model to high-traffic routes
  # ─────────────────────────────────────────────────────────────────────────
  - phase_id: P5-C
    status: not-started
    objective: >
      Add explicit response_model declarations to route handlers that
      currently return untyped dicts.  Currently 484/1034 routes (47%)
      lack response_model.  This improves OpenAPI documentation, enables
      automatic response validation, and prevents accidental data leakage
      (e.g., returning password hashes in user objects).
      Focus on customer-facing and admin-critical routes first.
    priority: P3
    estimated_hours: 8-12
    dependencies: [P5-A]
    scope:
      target_domains:
        - "auth (login/register/token refresh) — highest traffic"
        - "wallet (balance, transactions, recharge) — money-critical"
        - "bookings (create, status, cancel) — core business"
        - "stations (list, detail, availability) — customer-facing"
        - "admin users (list, detail, update) — admin console"
      tasks:
        - task_id: P5-C-1
          title: "Create response schemas for top-5 domains"
          description: >
            Define Pydantic response models in app/schemas/ for auth, wallet,
            bookings, stations, and admin-users domains.  Use existing models
            as base, add explicit field includes/excludes.
          file: app/schemas/response_contracts.py
          action: create
        - task_id: P5-C-2
          title: "Add response_model to high-traffic routes"
          description: >
            Annotate route decorators with response_model=<Schema> for
            the top-5 domain routes.  Verify OpenAPI spec updates.
          action: refactor
        - task_id: P5-C-3
          title: "CI guard – response model coverage"
          description: >
            Test that scans high-priority route files and asserts every
            handler has a response_model declaration.
          file: tests/test_response_model_coverage.py
          action: create
    db_migration_impact: none
    test_tasks:
      - type: unit
        description: "Run response model coverage CI guard."
    acceptance_criteria:
      - "Auth, wallet, bookings, stations, admin-users routes all have response_model."
      - "OpenAPI spec shows typed response schemas for covered routes."
      - "CI guard test passes."
    rollout_strategy: "Add schemas first, then annotate routes. Non-breaking addition."
    rollback_strategy: "Remove response_model annotations; routes still work with Any return."
    risk_controls:
      - "response_model is additive — removing it is always safe."
      - "Test with existing integration tests to catch serialization issues."

# ═══════════════════════════════════════════════════════════════════════════
# GLOBAL RISKS
# ═══════════════════════════════════════════════════════════════════════════
global_risks:
  - risk_id: GR-1
    description: >
      Transaction schema drift: wallet_service.py writes to 6 columns that
      don't exist in the Transaction model. These writes are silently
      dropped by SQLModel in some DB configurations (SQLite) but may
      cause errors in PostgreSQL strict mode.
    severity: critical
    mitigated_by: P1-C
    mitigation_status: resolved
    resolved_at: "2026-04-06"
    resolution_note: >
      P1-C added 6 canonical fields (type, category, balance_after,
      reference_type, reference_id, razorpay_payment_id) to the
      Transaction model.  Schema now matches wallet_service writes.
    detection: >
      Run: SELECT column_name FROM information_schema.columns
      WHERE table_name='transactions';
      Compare against Transaction model fields.

  - risk_id: GR-2
    description: >
      34 duplicate route registrations cause handler shadowing.
      FastAPI serves the first-registered handler; the second is unreachable.
      This means 'enhanced' handlers may never execute.
    severity: critical
    mitigated_by: [P0-A, P0-B]
    mitigation_status: resolved
    resolved_at: "2026-04-06"
    resolution_note: >
      P0-A removed rbac_admin include (23 dupes), P0-B deconflicted
      remaining 11 routes. test_route_collisions.py CI guard prevents
      regression. Current duplicate count: 0.
    detection: >
      Run route inventory script; assert duplicate count = 0.

  - risk_id: GR-3
    description: >
      17 endpoints call nonexistent service methods. Any request to
      these endpoints crashes with AttributeError 500.
    severity: high
    mitigated_by: P1-A
    mitigation_status: resolved
    resolved_at: "2026-04-06"
    resolution_note: >
      P1-A implemented all 17 missing service methods.  P1-B CI guard
      (test_service_contracts.py) prevents future regressions.
    detection: >
      Run service-contract test (P1-B).

  - risk_id: GR-4
    description: >
      MockKYCProvider auto-approves all KYC submissions. If ENVIRONMENT
      variable is misconfigured, production could auto-approve.
    severity: high
    mitigated_by: P2-B
    mitigation_status: resolved
    resolved_at: "2026-04-06"
    resolution_note: >
      KYCService.__init__ raises RuntimeError("FATAL: MockKYCProvider is
      active in production") if production + MockKYCProvider detected.
      Belt-and-suspenders guard present in kyc_service.py.
    detection: >
      Startup assertion in KYCService.__init__ (to be added in P2-B).

  - risk_id: GR-5
    description: >
      No CI protection against future route collisions or missing
      service methods. Regressions can be reintroduced silently.
    severity: medium
    mitigated_by: [P0-C, P1-B]
    mitigation_status: resolved
    resolved_at: "2026-04-06"
    resolution_note: >
      test_route_collisions.py (P0-C) prevents route dupes.
      test_service_contracts.py (P1-B) prevents missing methods.
      Additional CI guards added in P3-P4 for module boundaries,
      error safety, input contracts, and structured logging.
    detection: >
      CI pipeline runs guard tests on every PR.

  - risk_id: GR-6
    description: >
      Wallet operations use SELECT ... FOR UPDATE but some code paths
      (transfer_balance in wallet.py) call a method that doesn't exist.
      If/when implemented, race conditions are possible if FOR UPDATE
      is not applied consistently across both sender and recipient wallets.
    severity: high
    mitigated_by: [P1-A, P2-A]
    mitigation_status: resolved
    resolved_at: "2026-04-06"
    resolution_note: >
      P1-A implemented WalletService.transfer_balance with dual
      select(...).with_for_update() on both sender and recipient.
      P3-A added conservation-law invariant tests (transfer_conserves_total_money).
      P3-B added SLOTimer instrumentation to all wallet methods.
    detection: >
      Concurrent transfer stress test after P1-A implementation.

