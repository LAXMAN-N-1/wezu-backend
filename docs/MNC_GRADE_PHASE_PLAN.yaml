        description: >
          Create Pydantic schemas for the 8 raw-dict route parameters:
          1) profile.py:update_preferences → PreferencesUpdate schema
          2) profile.py:change_password → ChangePasswordRequest schema
          3) dealers.py:create_dealer_promotion → DealerPromotionCreate schema
