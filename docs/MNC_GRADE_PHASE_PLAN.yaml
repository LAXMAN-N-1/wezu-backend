  - path: alembic/env.py
    reason: "Alembic environment config is shared infrastructure."
  - path: app/api/v1/dashboard.py
    reason: "Recently hardened (batch 1); already DB-driven."
  - path: app/api/v1/bookings.py
    reason: "Recently hardened (batch 1); booking lifecycle is tested."
  - path: app/api/v1/analytics_enhanced.py
    reason: "Recently hardened (batch 1); analytics export is tested."
  - path: app/services/payment_method_service.py
    reason: "Recently hardened (batch 2); shared across payments + wallet."
  - path: app/api/v1/dealer_portal_dashboard.py
    reason: "Recently hardened (batch 2); campaigns feed is DB-driven."

