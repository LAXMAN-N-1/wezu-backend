  # ─────────────────────────────────────────────────────────────────────────
  - phase_id: P1-C
    status: completed
    completed_at: "2026-04-06"
    objective: >
      Canonicalize the Transaction model to include all 6 fields used by
      live code but missing from the schema: type, category, balance_after,
      reference_type, reference_id, razorpay_payment_id.
      Add Alembic migration. Update DTOs at route boundary.
    risk_level: P0
    estimated_effort: "3 hours"
    file_scope:
      - app/models/financial.py
      - app/schemas/wallet.py
      - app/schemas/payment.py
      - alembic/versions/  # new migration file
      - app/api/v1/wallet.py
      - app/api/v1/wallet_enhanced.py
      - app/api/v1/payments_enhanced.py
      - app/services/wallet_service.py
    code_tasks:
      - task_id: P1-C-1
        description: >
          Add missing columns to Transaction model in app/models/financial.py:
            type: Optional[str] = Field(default=None, index=True)  # "credit" | "debit"
            category: Optional[str] = Field(default=None, index=True)  # "deposit","withdrawal","cashback","transfer","withdrawal_request","withdrawal_reversal"
            balance_after: Optional[float] = Field(default=None)
            reference_type: Optional[str] = Field(default=None)  # "wallet_recharge","withdrawal_request","booking_payment"
            reference_id: Optional[str] = Field(default=None, index=True)
            razorpay_payment_id: Optional[str] = Field(default=None, index=True)
          All fields are Optional with defaults to maintain backward compatibility.
        file: app/models/financial.py
        action: add_columns
      - task_id: P1-C-2
        description: >
          Generate Alembic migration:
            alembic revision --autogenerate -m "add_canonical_transaction_fields"
          Review generated migration. Ensure it only ADDs columns (not drops).
        action: generate_migration
      - task_id: P1-C-3
        description: >
          Update TransactionResponse schema in app/schemas/wallet.py to
          expose the new fields. Use Optional types to preserve backward
          compat with API consumers.
        file: app/schemas/wallet.py
        action: update_schema
      - task_id: P1-C-4
        description: >
          Audit all Transaction(...) constructor calls across the codebase.
          Ensure each call uses the canonical field names. Key files:
          - app/services/wallet_service.py (already uses the fields)
          - app/api/v1/wallet_enhanced.py (uses Transaction.category in filters)
          - app/api/v1/payments_enhanced.py (reads transaction.type, transaction.category)
          After schema is canonical, all these become valid column accesses.
        action: verify_all_callers
    db_migration_impact:
      description: >
        Alembic migration adds 6 nullable columns to the transactions table.
        No data loss. Existing rows get NULL for new columns.
        WalletService already writes these fields; after migration they
        persist to DB instead of being silently dropped by SQLModel.
      migration_files:
        - "alembic/versions/xxxx_add_canonical_transaction_fields.py"
      backwards_compatible: true
      downgrade_safe: true
      notes: >
        CRITICAL: Until this migration runs, wallet_service.py writes to
        columns that don't exist in the DB schema. SQLModel/SQLAlchemy
        silently ignores unknown columns in some configurations but may
        raise in strict mode. This phase MUST deploy migration before
        any code that depends on these columns in WHERE clauses.
    test_tasks:
      - type: unit
        description: >
          Test that Transaction model can be instantiated with all 6 new
          fields and round-trips through DB correctly.
        file: tests/test_transaction_schema.py  # NEW
      - type: integration
        description: >
          Test wallet recharge flow end-to-end: create intent → capture →
          verify balance_after, type, category, reference_type, reference_id
          are all persisted and queryable.
    acceptance_criteria:
      - "Transaction model defines all 6 fields."
      - "Alembic migration runs cleanly (upgrade + downgrade)."
      - "wallet_service.py writes persist to DB without silent drops."
      - "API responses include new fields when present."
    rollout_strategy: >
      1) Run migration on staging DB.
      2) Deploy code.
      3) Verify wallet operations write and read new fields.
      4) Run migration on production DB.
      5) Deploy code to production.
    rollback_strategy: >
      1) Revert code (fields become Optional, so old code ignores them).
      2) Optionally run alembic downgrade to remove columns.
      New columns are nullable; leaving them in place is also safe.
    risk_controls:
      - "Migration is additive only (no column drops, no renames)."
      - "All new fields are Optional with defaults."
      - "Run migration in a transaction with timeout on production."

