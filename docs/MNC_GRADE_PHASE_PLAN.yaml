  # ─────────────────────────────────────────────────────────────────────────
  # P4-A: Error-Handling Hardening & Detail-Leak Prevention
  # ─────────────────────────────────────────────────────────────────────────
  - phase_id: P4-A
    status: completed
    completed_at: "2025-07-25"
    objective: >
      Prevent internal error details (stack traces, DB errors, exception
      messages) from leaking to API clients. Harden the global error
      handler, fix 26 str(e) leak sites in route handlers, and add a
      CI guard to prevent future regressions.
    risk_level: P1
    estimated_effort: "3–4 hours"
    file_scope:
      - app/middleware/error_handler.py
      - app/api/v1/wallet.py
      - app/api/v1/auth.py
      - app/api/v1/admin_stations.py
      - app/api/v1/admin_rbac.py
      - app/api/v1/dealers.py
      - app/api/v1/dealer_kyc.py
      - app/api/v1/dealer_commission.py
      - app/api/v1/dealer_portal_customers.py
      - tests/test_error_safety.py  # NEW
    code_tasks:
      - task_id: P4-A-1
        description: >
          Fix ErrorHandlerMiddleware to not leak str(e) in production.
          In production mode, return generic "Internal Server Error" with
          only the request_id for correlation. In development mode, keep
          detail for debugging convenience.
        file: app/middleware/error_handler.py
        action: harden
        rules:
          - "If ENVIRONMENT == 'production': detail = 'See logs for request_id=<X>'"
          - "Always log the full exception to structlog with request_id."
          - "Never return traceback, SQL errors, or internal paths to client."
      - task_id: P4-A-2
        description: >
          Fix all 26 sites where route handlers do
          `raise HTTPException(detail=str(e))` or `return {..., "error": str(e)}`.
          Replace with safe error codes + log the original exception.
          Priority files: wallet.py, auth.py, admin_rbac.py, dealers.py,
          dealer_commission.py, dealer_kyc.py, admin_stations.py,
          dealer_portal_customers.py.
        action: fix_leak_sites
        rules:
          - "Replace detail=str(e) with detail='Operation failed' or specific safe message."
          - "Add logger.exception(...) BEFORE the raise to preserve audit trail."
          - "For 400-level errors from known ValueError/validation, safe message OK."
          - "For 500-level errors, NEVER expose str(e) to client."
      - task_id: P4-A-3
        description: >
          Create tests/test_error_safety.py — AST-based CI guard that
          scans all route files for `detail=str(e)` and `detail=f"...{str(e)}"` patterns.
          Fails if any are found in 500-level exception raises.
        file: tests/test_error_safety.py
        action: create
    db_migration_impact: none
    test_tasks:
      - type: unit
        description: "Run error safety CI guard."
        command: |
          DATABASE_URL=sqlite:///./test_wezu.db REDIS_URL=redis://localhost:6379/0 \
          SECRET_KEY=test_secret_for_ci_only ENVIRONMENT=testing python3.11 -m pytest -q \
          tests/test_error_safety.py
      - type: integration
        description: >
          Trigger a 500 error via TestClient; assert response body does NOT
          contain exception class name, SQL text, or file paths.
    acceptance_criteria:
      - "ErrorHandlerMiddleware does not expose str(e) in production responses."
      - "Zero route handlers pass str(e) to 500-level HTTPException detail."
      - "CI guard test prevents future regressions."
      - "All errors are still logged server-side with full context."
    rollout_strategy: "Deploy to staging. Hit endpoints with bad input; verify error responses are safe."
    rollback_strategy: "Revert. Prior behavior was insecure but functional."
    risk_controls:
      - "Error messages become less verbose for debugging — mitigated by structured server-side logging."
      - "400-level validation errors may keep safe user-facing messages."

