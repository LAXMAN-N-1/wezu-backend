phases:

  # ─────────────────────────────────────────────────────────────────────────
  # P0-A: RBAC Double Registration Fix  ✅ COMPLETED 2026-04-06
  # ─────────────────────────────────────────────────────────────────────────
  - phase_id: P0-A
    status: completed
    completed_at: "2026-04-06"
    objective: >
      Eliminate all 23 RBAC duplicate route registrations caused by
      app/api/admin/rbac_admin.py re-exporting the same router object
      that app/main.py also mounts under the same prefix.
    risk_level: P0
    estimated_effort: "30 minutes"
    file_scope:
      - app/api/admin/rbac_admin.py
      - app/api/admin/__init__.py
      - app/main.py
    code_tasks:
      - task_id: P0-A-1
        description: >
          In app/api/admin/__init__.py, REMOVE the line:
            router.include_router(rbac_admin.router, prefix="/rbac", tags=["Admin RBAC"])
          This prevents the global_admin_router (mounted at /api/v1/admin)
          from re-mounting rbac routes that are already mounted directly by
          app.main.py via admin_rbac.router at /api/v1/admin/rbac.
        file: app/api/admin/__init__.py
        action: remove_line
        target_line: 'router.include_router(rbac_admin.router, prefix="/rbac", tags=["Admin RBAC"])'
      - task_id: P0-A-2
        description: >
          Verify app/main.py still has exactly ONE registration:
            app.include_router(admin_rbac.router, prefix=f"{admin_api}/rbac", ...)
          Confirm no other file re-includes admin_rbac.router.
        file: app/main.py
        action: verify_only
    db_migration_impact: none
    test_tasks:
      - type: unit
        description: >
          Run route-inventory script and assert RBAC routes appear
          exactly once each. Count must drop from 46 to 23.
        command: |
          DATABASE_URL=sqlite:///./test_wezu.db REDIS_URL=redis://localhost:6379/0 \
          SECRET_KEY=test_secret_for_ci_only python3.11 -c "
          from app.main import app
          rbac = [(r.path, list(r.methods)) for r in app.routes
                  if hasattr(r,'path') and '/rbac/' in r.path]
          from collections import Counter
          dupes = {k:v for k,v in Counter([(p,tuple(sorted(m))) for p,m in rbac]).items() if v>1}
          assert not dupes, f'RBAC duplicates remain: {dupes}'
          print('P0-A PASS: 0 RBAC duplicates')
          "
      - type: integration
        description: "Run existing RBAC test suite to confirm no regression."
        command: |
          DATABASE_URL=sqlite:///./test_wezu.db REDIS_URL=redis://localhost:6379/0 \
          SECRET_KEY=test_secret_for_ci_only python3.11 -m pytest -q \
          tests/api/v1/test_rbac.py tests/api/v1/test_granular_rbac.py
    acceptance_criteria:
      - "Zero RBAC routes with duplicate path+method registrations."
      - "All existing RBAC tests pass unchanged."
    rollout_strategy: "Merge to staging, run full test suite, deploy to production with no traffic shift needed."
    rollback_strategy: "Revert single commit; re-add the removed include_router line."
    risk_controls:
      - "Change is purely subtractive (removes redundant mount). No new code."

  # ─────────────────────────────────────────────────────────────────────────
  # P0-B: Enhanced Module Route Deconfliction  ✅ COMPLETED 2026-04-06
  # ─────────────────────────────────────────────────────────────────────────
  - phase_id: P0-B
    status: completed
    completed_at: "2026-04-06"
    objective: >
      Eliminate the remaining 11 cross-file duplicate routes caused by
      legacy routers (payments, wallet, notifications, support, rentals)
      mounting overlapping paths with their _enhanced counterparts.
      Consolidate handler ownership so exactly ONE handler serves each path.
    risk_level: P0
    estimated_effort: "2 hours"
    file_scope:
      # Overlapping source files (legacy)
      - app/api/v1/payments.py
      - app/api/v1/wallet.py
      - app/api/v1/notifications.py
      - app/api/v1/support.py
      - app/api/v1/rentals.py
      # Overlapping target files (enhanced)
      - app/api/v1/payments_enhanced.py
      - app/api/v1/wallet_enhanced.py
      - app/api/v1/notifications_enhanced.py
      - app/api/v1/support_enhanced.py
      - app/api/v1/rentals_enhanced.py
      # Admin users (cross-package)
      - app/api/admin/users.py
      - app/api/v1/admin_users.py
      # Router mount
      - app/main.py
    code_tasks:
      - task_id: P0-B-1
        description: >
          For each duplicate pair, decide owner using rule:
          if _enhanced version has DB-backed logic → keep enhanced, remove from legacy.
          If legacy is DB-backed and enhanced is thin wrapper → keep legacy, remove from enhanced.
          Document decision in inline comment at removal site.
        action: consolidate
        duplicate_map:
          - path: "POST /payments/methods"
            keep: app/api/v1/payments.py
            remove_from: app/api/v1/payments_enhanced.py
            reason: "payments.py already uses PaymentMethodService (hardened batch 2)"
          - path: "DELETE /payments/methods/{method_id}"
            keep: app/api/v1/payments.py
            remove_from: app/api/v1/payments_enhanced.py
            reason: "payments.py already uses PaymentMethodService"
          - path: "POST /wallet/transfer"
            keep: app/api/v1/wallet_enhanced.py
            remove_from: app/api/v1/wallet.py
            reason: "wallet.py calls missing WalletService.transfer_balance; enhanced version must be implemented"
          - path: "GET /wallet/cashback"
            keep: app/api/v1/wallet_enhanced.py
            remove_from: app/api/v1/wallet.py
            reason: "wallet.py calls missing WalletService.get_cashback_history; enhanced must implement"
          - path: "PATCH /notifications/read-all"
            keep: app/api/v1/notifications_enhanced.py
            remove_from: app/api/v1/notifications.py
            reason: "enhanced has mark_all_read implementation"
          - path: "POST /notifications/device-token"
            keep: app/api/v1/notifications_enhanced.py
            remove_from: app/api/v1/notifications.py
            reason: "enhanced has richer device-token handling"
          - path: "GET /rentals/{rental_id}/receipt"
            keep: app/api/v1/rentals_enhanced.py
            remove_from: app/api/v1/rentals.py
            reason: "enhanced has hardened receipt generation"
          - path: "POST /rentals/{rental_id}/report-issue"
            keep: app/api/v1/rentals_enhanced.py
            remove_from: app/api/v1/rentals.py
            reason: "enhanced has DB-backed issue reporting"
          - path: "GET /support/faq/search"
            keep: app/api/v1/support_enhanced.py
            remove_from: app/api/v1/support.py
            reason: "enhanced has improved search"
          - path: "POST /support/tickets/{ticket_id}/attachment"
            keep: app/api/v1/support_enhanced.py
            remove_from: app/api/v1/support.py
            reason: "enhanced has file-handling improvements"
          - path: "POST /admin/users/{user_id}/reset-password"
            keep: app/api/v1/admin_users.py
            remove_from: app/api/admin/users.py
            reason: "v1/admin_users.py has richer audit trail"
      - task_id: P0-B-2
        description: >
          For each "remove_from" endpoint: comment out or delete the
          route decorator + handler function. Add an inline comment:
          # DECONFLICTED P0-B: handler moved to {keep_file}
        action: remove_duplicate_handlers
      - task_id: P0-B-3
        description: >
          After removals, verify no import breakage. Run:
            python -c "from app.main import app; print(len(app.routes))"
          Route count should drop by exactly 11 (from 943 to 932).
        action: verify
    db_migration_impact: none
    test_tasks:
      - type: unit
        description: "Assert zero duplicate path+method registrations across entire app."
        command: |
          DATABASE_URL=sqlite:///./test_wezu.db REDIS_URL=redis://localhost:6379/0 \
          SECRET_KEY=test_secret_for_ci_only python3.11 -c "
          from app.main import app
          from collections import Counter
          pairs = []
          for r in app.routes:
              if hasattr(r,'path') and hasattr(r,'methods'):
                  for m in r.methods:
                      if m != 'HEAD':
                          pairs.append((r.path, m))
          dupes = {k:v for k,v in Counter(pairs).items() if v>1}
          assert not dupes, f'Duplicates remain: {dupes}'
          print(f'P0-B PASS: 0 duplicates in {len(set(pairs))} unique routes')
          "
      - type: integration
        description: "Run full existing test suite to confirm no regressions."
        command: |
          DATABASE_URL=sqlite:///./test_wezu.db REDIS_URL=redis://localhost:6379/0 \
          SECRET_KEY=test_secret_for_ci_only python3.11 -m pytest -q tests/
    acceptance_criteria:
      - "Zero duplicate path+method registrations in the entire FastAPI app."
      - "All existing tests pass."
      - "Removed handlers are documented with DECONFLICTED comment."
    rollout_strategy: "Deploy to staging. Run route inventory diff. Confirm front-end clients hit correct handlers."
    rollback_strategy: "Revert commit. Duplicates are harmless at runtime (first-registered wins); reverting restores prior behavior."
    risk_controls:
      - "Keep removed code commented (not deleted) for one release cycle."
      - "Tag commit with route_manifest.json snapshot for diff auditing."

  # ─────────────────────────────────────────────────────────────────────────
