info:
  name: List Sessions
  type: http
  seq: 1
  tags:
    - Sessions

http:
  method: GET
  url: "{{baseUrl}}/api/v1/sessions/list"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/sessions/list"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 0,
              "device_type": "",
              "device_name": "",
              "ip_address": "",
              "last_active_at": "",
              "is_current": false,
              "is_active": false,
              "created_at": ""
            }
          ]

docs: List all active sessions for the current user.
