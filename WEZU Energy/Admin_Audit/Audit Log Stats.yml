info:
  name: Audit Log Stats
  type: http
  seq: 2
  tags:
    - Admin_Audit

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/audit-logs/stats"
  params:
    - name: date_from
      value: ""
      type: query
      description: Start of date range (UTC)
      disabled: true
    - name: date_to
      value: ""
      type: query
      description: End of date range (UTC)
      disabled: true
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/audit-logs/stats"
      method: GET
      params:
        - name: date_from
          value: ""
          type: query
          description: Start of date range (UTC)
          disabled: true
        - name: date_to
          value: ""
          type: query
          description: End of date range (UTC)
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/audit-logs/stats"
      method: GET
      params:
        - name: date_from
          value: ""
          type: query
          description: Start of date range (UTC)
          disabled: true
        - name: date_to
          value: ""
          type: query
          description: End of date range (UTC)
          disabled: true
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: |-
  Get audit log summary statistics.
  Returns total count, top actions, and top resource types.
