info:
  name: Export Audit Json
  type: http
  seq: 4
  tags:
    - Admin_Audit

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/audit-logs/export/json"
  params:
    - name: user_id
      value: ""
      type: query
      disabled: true
    - name: action
      value: ""
      type: query
      disabled: true
    - name: resource_type
      value: ""
      type: query
      disabled: true
    - name: target_id
      value: ""
      type: query
      disabled: true
    - name: date_from
      value: ""
      type: query
      disabled: true
    - name: date_to
      value: ""
      type: query
      disabled: true
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

