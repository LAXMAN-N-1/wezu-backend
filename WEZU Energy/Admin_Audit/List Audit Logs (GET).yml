info:
  name: List Audit Logs (GET)
  type: http
  seq: 1
  tags:
    - Admin_Audit

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/audit-logs/"
  params:
    - name: user_id
      value: ""
      type: query
      description: Filter by user ID
      disabled: true
    - name: action
      value: ""
      type: query
      description: Filter by action type (e.g. AUTH_LOGIN)
      disabled: true
    - name: resource_type
      value: ""
      type: query
      description: Filter by resource type (e.g. USER, BATTERY)
      disabled: true
    - name: target_id
      value: ""
      type: query
      description: Filter by target entity ID
      disabled: true
    - name: date_from
      value: ""
      type: query
      description: Start of date range (UTC)
      disabled: true
    - name: date_to
      value: ""
      type: query
      description: End of date range (UTC)
      disabled: true
    - name: skip
      value: "0"
      type: query
      description: Pagination offset
    - name: limit
      value: "50"
      type: query
      description: Pagination limit
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

