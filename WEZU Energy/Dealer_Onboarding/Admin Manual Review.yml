info:
  name: Admin Manual Review
  type: http
  seq: 5
  tags:
    - Dealer_Onboarding

http:
  method: POST
  url: "{{baseUrl}}/api/v1/dealer/onboarding/admin/:application_id/review"
  params:
    - name: application_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "approve": false,
        "notes": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/dealer/onboarding/admin/:application_id/review"
      method: POST
      params:
        - name: application_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "approve": false,
            "notes": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/dealer/onboarding/admin/:application_id/review"
      method: POST
      params:
        - name: application_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "approve": false,
            "notes": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: "Stage 4: Admin reviews application and KYC."
