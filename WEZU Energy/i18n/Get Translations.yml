info:
  name: Get Translations
  type: http
  seq: 1
  tags:
    - i18n

http:
  method: GET
  url: "{{baseUrl}}/api/v1/i18n/:lang"
  params:
    - name: lang
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/i18n/:lang"
      method: GET
      params:
        - name: lang
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/i18n/:lang"
      method: GET
      params:
        - name: lang
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: Get all translations for a language (key-value dict) for frontend caching.
