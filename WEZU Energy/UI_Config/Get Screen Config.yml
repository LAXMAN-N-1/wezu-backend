info:
  name: Get Screen Config
  type: http
  seq: 1
  tags:
    - UI_Config

http:
  method: GET
  url: "{{baseUrl}}/api/v1/screens/:screen_id/config"
  params:
    - name: screen_id
      value: ""
      type: path
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/screens/:screen_id/config"
      method: GET
      params:
        - name: screen_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "screen_id": "",
            "columns": [
              {
                "field": "",
                "label": "",
                "visible": false,
                "sortable": false,
                "permission_required": ""
              }
            ],
            "actions": [
              {
                "id": "",
                "label": "",
                "enabled": false,
                "permission": ""
              }
            ],
            "filters": [
              {}
            ],
            "bulk_actions": [
              {}
            ]
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/screens/:screen_id/config"
      method: GET
      params:
        - name: screen_id
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: Get dynamic configuration for a specific screen based on user permissions.
