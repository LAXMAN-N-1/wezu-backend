info:
  name: Get Product Details
  type: http
  seq: 8
  tags:
    - Catalog

http:
  method: GET
  url: "{{baseUrl}}/api/v1/catalog/products/:product_id"
  params:
    - name: product_id
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
