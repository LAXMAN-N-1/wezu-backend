info:
  name: Search Products
  type: http
  seq: 5
  tags:
    - Catalog

http:
  method: POST
  url: "{{baseUrl}}/api/v1/catalog/products/search"
  body:
    type: json
    data: |-
      {
        "query": "",
        "category": "",
        "brand": "",
        "min_price": "",
        "max_price": "",
        "min_capacity": "",
        "max_capacity": "",
        "min_rating": "",
        "in_stock_only": false,
        "sort_by": "",
        "page": 0,
        "page_size": 0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/catalog/products/search"
      method: POST
      body:
        type: json
        data: |-
          {
            "query": "",
            "category": "",
            "brand": "",
            "min_price": "",
            "max_price": "",
            "min_capacity": "",
            "max_capacity": "",
            "min_rating": "",
            "in_stock_only": false,
            "sort_by": "",
            "page": 0,
            "page_size": 0
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "message": "",
            "data": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/catalog/products/search"
      method: POST
      body:
        type: json
        data: |-
          {
            "query": "",
            "category": "",
            "brand": "",
            "min_price": "",
            "max_price": "",
            "min_capacity": "",
            "max_capacity": "",
            "min_rating": "",
            "in_stock_only": false,
            "sort_by": "",
            "page": 0,
            "page_size": 0
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

