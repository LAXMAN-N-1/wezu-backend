info:
  name: Create Order
  type: http
  seq: 12
  tags:
    - Catalog

http:
  method: POST
  url: "{{baseUrl}}/api/v1/catalog/orders"
  body:
    type: json
    data: |-
      {
        "items": [
          {
            "product_id": 0,
            "variant_id": "",
            "quantity": 0
          }
        ],
        "shipping_address": {
          "address": "",
          "city": "",
          "state": "",
          "pincode": "",
          "phone": ""
        },
        "payment_method": "",
        "customer_notes": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

