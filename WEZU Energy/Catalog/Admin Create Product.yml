info:
  name: Admin Create Product
  type: http
  seq: 2
  tags:
    - Catalog

http:
  method: POST
  url: "{{baseUrl}}/api/v1/catalog/admin/products"
  body:
    type: json
    data: |-
      {
        "name": "",
        "description": "",
        "category": "",
        "brand": "",
        "model": "",
        "sku": "",
        "price": 0,
        "original_price": "",
        "discount_percentage": "",
        "capacity_mah": "",
        "voltage": "",
        "battery_type": "",
        "warranty_months": 0,
        "warranty_terms": "",
        "stock_quantity": 0,
        "status": "",
        "is_featured": false,
        "images": [
          {
            "image_url": "",
            "alt_text": "",
            "is_primary": false,
            "display_order": 0
          }
        ],
        "variants": [
          {
            "variant_name": "",
            "sku": "",
            "price": "",
            "stock_quantity": 0,
            "color": "",
            "capacity_mah": ""
          }
        ]
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

