info:
  name: Checkout Cart
  type: http
  seq: 23
  tags:
    - Catalog

http:
  method: POST
  url: "{{baseUrl}}/api/v1/catalog/orders/checkout"
  params:
    - name: payment_method
      value: RAZORPAY
      type: query
  body:
    type: json
    data: |-
      {
        "address": "",
        "city": "",
        "state": "",
        "pincode": "",
        "phone": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/catalog/orders/checkout"
      method: POST
      params:
        - name: payment_method
          value: RAZORPAY
          type: query
      body:
        type: json
        data: |-
          {
            "address": "",
            "city": "",
            "state": "",
            "pincode": "",
            "phone": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "message": "",
            "data": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/catalog/orders/checkout"
      method: POST
      params:
        - name: payment_method
          value: RAZORPAY
          type: query
      body:
        type: json
        data: |-
          {
            "address": "",
            "city": "",
            "state": "",
            "pincode": "",
            "phone": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

