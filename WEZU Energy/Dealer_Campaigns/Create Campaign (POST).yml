info:
  name: Create Campaign (POST)
  type: http
  seq: 1
  tags:
    - Dealer_Campaigns

http:
  method: POST
  url: "{{baseUrl}}/api/v1/dealer/campaigns"
  body:
    type: json
    data: |-
      {
        "name": "",
        "description": "",
        "promo_code": "",
        "discount_type": "",
        "discount_value": 0,
        "min_purchase_amount": "",
        "max_discount_amount": "",
        "budget_limit": "",
        "daily_cap": "",
        "usage_limit_total": "",
        "usage_limit_per_user": 0,
        "applicable_to": "",
        "applicable_station_ids": "",
        "start_date": "",
        "end_date": "",
        "is_active": false
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/dealer/campaigns"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "description": "",
            "promo_code": "",
            "discount_type": "",
            "discount_value": 0,
            "min_purchase_amount": "",
            "max_discount_amount": "",
            "budget_limit": "",
            "daily_cap": "",
            "usage_limit_total": "",
            "usage_limit_per_user": 0,
            "applicable_to": "",
            "applicable_station_ids": "",
            "start_date": "",
            "end_date": "",
            "is_active": false
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/dealer/campaigns"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "description": "",
            "promo_code": "",
            "discount_type": "",
            "discount_value": 0,
            "min_purchase_amount": "",
            "max_discount_amount": "",
            "budget_limit": "",
            "daily_cap": "",
            "usage_limit_total": "",
            "usage_limit_per_user": 0,
            "applicable_to": "",
            "applicable_station_ids": "",
            "start_date": "",
            "end_date": "",
            "is_active": false
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
