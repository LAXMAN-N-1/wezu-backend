info:
  name: Transfer To User
  type: http
  seq: 8
  tags:
    - Wallet

http:
  method: POST
  url: "{{baseUrl}}/api/v1/wallet/transfer"
  body:
    type: json
    data: |-
      {
        "recipient_phone": "",
        "amount": 0,
        "note": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/wallet/transfer"
      method: POST
      body:
        type: json
        data: |-
          {
            "recipient_phone": "",
            "amount": 0,
            "note": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "wallet_id": "",
            "user_id": 0,
            "rental_id": "",
            "amount": 0,
            "currency": "",
            "transaction_type": "",
            "status": "",
            "payment_method": "",
            "payment_gateway_ref": "",
            "description": "",
            "created_at": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/wallet/transfer"
      method: POST
      body:
        type: json
        data: |-
          {
            "recipient_phone": "",
            "amount": 0,
            "note": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: Transfer money to another user by phone number
