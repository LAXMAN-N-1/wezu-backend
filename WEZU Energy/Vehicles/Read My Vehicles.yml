info:
  name: Read My Vehicles
  type: http
  seq: 1
  tags:
    - Vehicles

http:
  method: GET
  url: "{{baseUrl}}/api/v1/vehicles/"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/vehicles/"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "make": "",
              "model": "",
              "registration_number": "",
              "vin": "",
              "compatible_battery_type": "",
              "id": 0,
              "user_id": 0,
              "is_active": false,
              "is_verified": false,
              "created_at": ""
            }
          ]

docs: Get current user's vehicles.
