info:
  name: Update Driver Profile
  type: http
  seq: 18
  tags:
    - Logistics

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/logistics/drivers/:id"
  params:
    - name: id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "license_number": "",
        "vehicle_type": "",
        "vehicle_plate": "",
        "is_online": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/logistics/drivers/:id"
      method: PUT
      params:
        - name: id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "license_number": "",
            "vehicle_type": "",
            "vehicle_plate": "",
            "is_online": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "message": "",
            "data": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/logistics/drivers/:id"
      method: PUT
      params:
        - name: id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "license_number": "",
            "vehicle_type": "",
            "vehicle_plate": "",
            "is_online": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
