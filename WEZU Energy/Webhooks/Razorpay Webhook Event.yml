info:
  name: Razorpay Webhook Event
  type: http
  seq: 1
  tags:
    - Webhooks

http:
  method: POST
  url: "{{baseUrl}}/api/webhooks/razorpay"
  headers:
    - name: x-razorpay-signature
      value: ""
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/webhooks/razorpay"
      method: POST
      headers:
        - name: x-razorpay-signature
          value: ""
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/webhooks/razorpay"
      method: POST
      headers:
        - name: x-razorpay-signature
          value: ""
          disabled: true
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
