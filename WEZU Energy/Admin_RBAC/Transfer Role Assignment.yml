info:
  name: Transfer Role Assignment
  type: http
  seq: 11
  tags:
    - Admin_RBAC

http:
  method: POST
  url: "{{baseUrl}}/api/v1/admin/rbac/users/:source_user_id/roles/transfer"
  params:
    - name: source_user_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "new_user_id": 0,
        "role_id": 0,
        "reason": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/rbac/users/:source_user_id/roles/transfer"
      method: POST
      params:
        - name: source_user_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "new_user_id": 0,
            "role_id": 0,
            "reason": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "message": "",
            "old_assignment_id": "",
            "new_assignment_id": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/rbac/users/:source_user_id/roles/transfer"
      method: POST
      params:
        - name: source_user_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "new_user_id": 0,
            "role_id": 0,
            "reason": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: |-
  Transfer a role from one user to another.
  Removes role from source user and assigns to target user.
