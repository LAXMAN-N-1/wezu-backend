info:
  name: Assign Access Path
  type: http
  seq: 20
  tags:
    - Admin_RBAC

http:
  method: POST
  url: "{{baseUrl}}/api/v1/admin/rbac/users/:user_id/access-paths"
  params:
    - name: user_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "path_pattern": "",
        "access_level": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/rbac/users/:user_id/access-paths"
      method: POST
      params:
        - name: user_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "path_pattern": "",
            "access_level": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "path_pattern": "",
            "access_level": "",
            "id": 0,
            "user_id": 0,
            "created_by": "",
            "created_by_name": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/rbac/users/:user_id/access-paths"
      method: POST
      params:
        - name: user_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "path_pattern": "",
            "access_level": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: Assign a geographic or hierarchical access path to a user.
