info:
  name: Remove Role From User
  type: http
  seq: 12
  tags:
    - Admin_RBAC

http:
  method: DELETE
  url: "{{baseUrl}}/api/v1/admin/rbac/users/:user_id/roles/:role_id"
  params:
    - name: user_id
      value: ""
      type: path
    - name: role_id
      value: ""
      type: path
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/rbac/users/:user_id/roles/:role_id"
      method: DELETE
      params:
        - name: user_id
          value: ""
          type: path
        - name: role_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "active_permissions": [],
            "menu_config": "",
            "user_id": "",
            "role_id": "",
            "message": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/rbac/users/:user_id/roles/:role_id"
      method: DELETE
      params:
        - name: user_id
          value: ""
          type: path
        - name: role_id
          value: ""
          type: path
    response:
      status: 422
