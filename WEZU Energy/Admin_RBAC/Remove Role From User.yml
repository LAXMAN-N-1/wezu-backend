      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: |-
  Remove a role from a user.
  Prevents removing the last role.
