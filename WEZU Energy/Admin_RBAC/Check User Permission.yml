info:
  name: Check User Permission
  type: http
  seq: 16
  tags:
    - Admin_RBAC

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/rbac/users/:user_id/permissions/check"
  params:
    - name: user_id
      value: ""
      type: path
    - name: permission
      value: ""
      type: query
    - name: resource_id
      value: ""
      type: query
      disabled: true
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/rbac/users/:user_id/permissions/check"
      method: GET
      params:
        - name: user_id
          value: ""
          type: path
        - name: permission
          value: ""
          type: query
        - name: resource_id
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "has_permission": false,
            "granted_by_role": "",
            "scope": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/rbac/users/:user_id/permissions/check"
      method: GET
      params:
        - name: user_id
          value: ""
          type: path
        - name: permission
          value: ""
          type: query
        - name: resource_id
          value: ""
          type: query
          disabled: true
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: |-
  Verify if a user has a specific permission.
  Traverses all assigned roles and their hierarchy.
