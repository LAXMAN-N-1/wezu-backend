info:
  name: Get Users By Role
  type: http
  seq: 10
  tags:
    - Admin_RBAC

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/rbac/roles/:role_id/users"
  params:
    - name: role_id
      value: ""
      type: path
    - name: skip
      value: "0"
      type: query
    - name: limit
      value: "100"
      type: query
    - name: active_only
      value: "false"
      type: query
    - name: region
      value: ""
      type: query
      disabled: true
    - name: export_csv
      value: "false"
      type: query
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/rbac/roles/:role_id/users"
      method: GET
      params:
        - name: role_id
          value: ""
          type: path
        - name: skip
          value: "0"
          type: query
        - name: limit
          value: "100"
          type: query
        - name: active_only
          value: "false"
          type: query
        - name: region
          value: ""
          type: query
          disabled: true
        - name: export_csv
          value: "false"
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/rbac/roles/:role_id/users"
      method: GET
      params:
        - name: role_id
          value: ""
          type: path
        - name: skip
          value: "0"
          type: query
        - name: limit
          value: "100"
          type: query
        - name: active_only
          value: "false"
          type: query
        - name: region
          value: ""
          type: query
          disabled: true
        - name: export_csv
          value: "false"
          type: query
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: |-
  Get all users with a specific role.
  Supports filtering by active status and region (state/city).
  Supports CSV export.
