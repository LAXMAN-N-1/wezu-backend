info:
  name: Get User Roles
  type: http
  seq: 7
  tags:
    - Admin_RBAC

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/rbac/users/:user_id/roles"
  params:
    - name: user_id
      value: ""
      type: path
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/rbac/users/:user_id/roles"
      method: GET
      params:
        - name: user_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "role_id": 0,
              "role_name": "",
              "role_description": "",
              "assigned_at": "",
              "assigned_by": "",
              "assigned_by_name": "",
              "effective_from": "",
              "expires_at": "",
              "notes": "",
              "is_active": false
            }
          ]
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/rbac/users/:user_id/roles"
      method: GET
      params:
        - name: user_id
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: List all roles assigned to a user with details.
