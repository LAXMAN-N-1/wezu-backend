info:
  name: Bulk Assign Roles
  type: http
  seq: 9
  tags:
    - Admin_RBAC

http:
  method: POST
  url: "{{baseUrl}}/api/v1/admin/rbac/roles/bulk-assign"
  body:
    type: json
    data: |-
      {
        "role_id": 0,
        "user_ids": []
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/rbac/roles/bulk-assign"
      method: POST
      body:
        type: json
        data: |-
          {
            "role_id": 0,
            "user_ids": []
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "total_requested": 0,
            "total_success": 0,
            "total_failed": 0,
            "results": [
              {
                "user_id": 0,
                "success": false,
                "message": ""
              }
            ]
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/rbac/roles/bulk-assign"
      method: POST
      body:
        type: json
        data: |-
          {
            "role_id": 0,
            "user_ids": []
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: Assign a role to multiple users.
