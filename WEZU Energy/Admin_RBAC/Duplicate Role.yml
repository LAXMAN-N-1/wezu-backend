info:
  name: Duplicate Role
  type: http
  seq: 18
  tags:
    - Admin_RBAC

http:
  method: POST
  url: "{{baseUrl}}/api/v1/admin/rbac/roles/:role_id/duplicate"
  params:
    - name: role_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "new_name": "",
        "description": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

