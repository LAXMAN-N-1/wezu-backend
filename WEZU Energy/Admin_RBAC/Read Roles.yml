info:
  name: Read Roles
  type: http
  seq: 1
  tags:
    - Admin_RBAC

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/rbac/roles"
  params:
    - name: skip
      value: "0"
      type: query
    - name: limit
      value: "100"
      type: query
    - name: category
      value: ""
      type: query
      disabled: true
    - name: active_only
      value: "false"
      type: query
    - name: include_permissions
      value: "true"
      type: query
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
