info:
  name: Customer Register
  type: http
  seq: 2
  tags:
    - Customer_Auth

http:
  method: POST
  url: "{{baseUrl}}/api/v1/customer/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "",
        "phone_number": "",
        "full_name": "",
        "password": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/customer/auth/register"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "phone_number": "",
            "full_name": "",
            "password": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "access_token": "",
            "refresh_token": "",
            "token_type": "",
            "user": {
              "id": 0,
              "email": "",
              "phone_number": "",
              "full_name": "",
              "user_type": "",
              "kyc_status": "",
              "profile_picture": ""
            }
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/customer/auth/register"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "phone_number": "",
            "full_name": "",
            "password": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: Customer JSON registration. Creates user, hashes password, returns tokens.
