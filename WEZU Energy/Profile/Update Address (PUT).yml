info:
  name: Update Address (PUT)
  type: http
  seq: 6
  tags:
    - Profile

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/profile/addresses/:address_id"
  params:
    - name: address_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "street_address": "",
        "city": "",
        "state": "",
        "postal_code": "",
        "type": "",
        "is_default": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

