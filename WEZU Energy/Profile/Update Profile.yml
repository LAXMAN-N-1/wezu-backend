            "date_of_birth": "",
            "gender": "",
            "preferred_language": "",
            "emergency_contact": "",
            "notification_preferences": "",
            "security_question": "",
            "security_answer": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
