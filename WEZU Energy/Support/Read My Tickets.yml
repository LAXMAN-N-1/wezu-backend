info:
  name: Read My Tickets
  type: http
  seq: 3
  tags:
    - Support

http:
  method: GET
  url: "{{baseUrl}}/api/v1/support/tickets/my"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/support/tickets/my"
      method: GET
      params:
        - name: page
          value: "1"
          type: query
        - name: limit
          value: "10"
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "message": "",
            "data": [
              {
                "id": 0,
                "user_id": 0,
                "subject": "",
                "category": "",
                "priority": "",
                "status": "",
                "created_at": "",
                "assigned_to_id": ""
              }
            ],
            "total": 0,
            "page": 0,
            "limit": 0,
            "total_pages": 0
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/support/tickets/my"
      method: GET
      params:
        - name: page
          value: "1"
          type: query
        - name: limit
          value: "10"
          type: query
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: "Customer: list their own tickets with pagination"
