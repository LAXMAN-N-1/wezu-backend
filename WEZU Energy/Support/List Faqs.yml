info:
  name: List Faqs
  type: http
  seq: 15
  tags:
    - Support

http:
  method: GET
  url: "{{baseUrl}}/api/v1/support/faq"
  params:
    - name: category
      value: ""
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/support/faq"
      method: GET
      params:
        - name: category
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "question": "",
              "answer": "",
              "category": "",
              "is_active": false,
              "id": 0,
              "helpful_count": 0,
              "not_helpful_count": 0
            }
          ]
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/support/faq"
      method: GET
      params:
        - name: category
          value: ""
          type: query
          disabled: true
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: "Knowledge Base: List FAQs with optional category filter"
