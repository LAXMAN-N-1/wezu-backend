info:
  name: Get Support Agent Performance
  type: http
  seq: 12
  tags:
    - Support

http:
  method: GET
  url: "{{baseUrl}}/api/v1/support/admin/support/performance"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/support/admin/support/performance"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "agent_id": 0,
              "agent_name": "",
              "resolved_tickets": 0,
              "avg_resolution_time_hours": 0,
              "csat_score": 0
            }
          ]

docs: "Admin: KPIs for all support agents"
