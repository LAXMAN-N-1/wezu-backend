info:
  name: Reply Ticket
  type: http
  seq: 5
  tags:
    - Support

http:
  method: POST
  url: "{{baseUrl}}/api/v1/support/tickets/:ticket_id/reply"
  params:
    - name: ticket_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "message": "",
        "is_internal_note": false
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/support/tickets/:ticket_id/reply"
      method: POST
      params:
        - name: ticket_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "message": "",
            "is_internal_note": false
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "user_id": 0,
            "subject": "",
            "category": "",
            "priority": "",
            "status": "",
            "created_at": "",
            "assigned_to_id": "",
            "messages": [
              {
                "id": 0,
                "sender_id": 0,
                "message": "",
                "created_at": "",
                "is_internal_note": false
              }
            ]
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/support/tickets/:ticket_id/reply"
      method: POST
      params:
        - name: ticket_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "message": "",
            "is_internal_note": false
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

