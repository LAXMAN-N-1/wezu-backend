info:
  name: Close Ticket
  type: http
  seq: 6
  tags:
    - Support

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/support/tickets/:ticket_id/close"
  params:
    - name: ticket_id
      value: ""
      type: path
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/support/tickets/:ticket_id/close"
      method: PUT
      params:
        - name: ticket_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "user_id": 0,
            "subject": "",
            "category": "",
            "priority": "",
            "status": "",
            "created_at": "",
            "assigned_to_id": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/support/tickets/:ticket_id/close"
      method: PUT
      params:
        - name: ticket_id
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: "Customer: close a resolved ticket"
