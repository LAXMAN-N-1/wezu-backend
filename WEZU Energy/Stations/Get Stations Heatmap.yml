info:
  name: Get Stations Heatmap
  type: http
  seq: 16
  tags:
    - Stations

http:
  method: GET
  url: "{{baseUrl}}/api/v1/stations/heatmap"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/stations/heatmap"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "latitude": 0,
              "longitude": 0,
              "intensity": 0
            }
          ]

docs: Demand heatmap data aggregated by geography.
