info:
  name: Update Review
  type: http
  seq: 19
  tags:
    - Stations

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/stations/:station_id/reviews/:review_id"
  params:
    - name: station_id
      value: ""
      type: path
    - name: review_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "rating": "",
        "comment": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/stations/:station_id/reviews/:review_id"
      method: PUT
      params:
        - name: station_id
          value: ""
          type: path
        - name: review_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "rating": "",
            "comment": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "rating": 0,
            "comment": "",
            "id": 0,
            "user_id": 0,
            "created_at": "",
            "user_name": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/stations/:station_id/reviews/:review_id"
      method: PUT
      params:
        - name: station_id
          value: ""
          type: path
        - name: review_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "rating": "",
            "comment": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

