info:
  name: Create Station
  type: http
  seq: 2
  tags:
    - Stations

http:
  method: POST
  url: "{{baseUrl}}/api/v1/stations/"
  body:
    type: json
    data: |-
      {
        "name": "",
        "address": "",
        "city": "",
        "latitude": 0,
        "longitude": 0,
        "status": "",
        "contact_phone": "",
        "operating_hours": "",
        "is_24x7": false,
        "amenities": "",
        "station_type": "",
        "total_slots": 0,
        "power_rating_kw": "",
        "zone_id": "",
        "dealer_id": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

