        - name: status
          value: ERROR
          type: query
          disabled: true
        - name: status
          value: OFFLINE
          type: query
          disabled: true
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
