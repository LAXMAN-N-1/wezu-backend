              }
            ]
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/stations/:station_id/status"
      method: PUT
      params:
        - name: station_id
          value: ""
          type: path
        - name: status
          value: OPERATIONAL
