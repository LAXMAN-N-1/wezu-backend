info:
  name: Update Station Status
  type: http
  seq: 7
  tags:
    - Stations

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/stations/:station_id/status"
  params:
    - name: station_id
      value: ""
      type: path
    - name: status
      value: OPERATIONAL
      type: query
    - name: status
      value: MAINTENANCE
      type: query
      disabled: true
    - name: status
      value: CLOSED
      type: query
      disabled: true
    - name: status
      value: ERROR
      type: query
      disabled: true
    - name: status
      value: OFFLINE
      type: query
      disabled: true
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/stations/:station_id/status"
      method: PUT
      params:
        - name: station_id
          value: ""
          type: path
        - name: status
          value: OPERATIONAL
          type: query
        - name: status
          value: MAINTENANCE
          type: query
          disabled: true
        - name: status
          value: CLOSED
          type: query
          disabled: true
        - name: status
          value: ERROR
          type: query
          disabled: true
        - name: status
          value: OFFLINE
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "name": "",
            "address": "",
            "city": "",
            "latitude": 0,
            "longitude": 0,
            "status": "",
            "contact_phone": "",
            "operating_hours": "",
            "is_24x7": false,
            "amenities": "",
            "station_type": "",
            "total_slots": 0,
            "power_rating_kw": "",
            "zone_id": "",
            "dealer_id": "",
            "id": 0,
            "rating": 0,
            "total_reviews": 0,
            "available_batteries": 0,
            "available_slots": 0,
            "images": [
              {
                "url": "",
