info:
  name: Get Stations Map
  type: http
  seq: 15
  tags:
    - Stations

http:
  method: GET
  url: "{{baseUrl}}/api/v1/stations/map"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/stations/map"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 0,
              "name": "",
              "latitude": 0,
              "longitude": 0,
              "status": "",
              "available_batteries": 0
            }
          ]

docs: Return all station coordinates and status for map rendering.
