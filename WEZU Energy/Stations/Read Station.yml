info:
  name: Read Station
  type: http
  seq: 4
  tags:
    - Stations

http:
  method: GET
  url: "{{baseUrl}}/api/v1/stations/:station_id"
  params:
    - name: station_id
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/stations/:station_id"
      method: GET
      params:
        - name: station_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "name": "",
            "address": "",
            "city": "",
            "latitude": 0,
            "longitude": 0,
            "status": "",
            "contact_phone": "",
            "operating_hours": "",
            "is_24x7": false,
            "amenities": "",
            "station_type": "",
            "total_slots": 0,
            "power_rating_kw": "",
            "zone_id": "",
            "dealer_id": "",
            "id": 0,
            "rating": 0,
            "total_reviews": 0,
            "available_batteries": 0,
            "available_slots": 0,
            "images": [
              {
                "url": "",
                "is_primary": false
              }
            ]
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/stations/:station_id"
      method: GET
      params:
        - name: station_id
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
