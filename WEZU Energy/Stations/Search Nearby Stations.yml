info:
  name: Search Nearby Stations
  type: http
  seq: 3
  tags:
    - Stations

http:
  method: GET
  url: "{{baseUrl}}/api/v1/stations/nearby"
  params:
    - name: lat
      value: ""
      type: query
    - name: lon
      value: ""
      type: query
    - name: radius
      value: "50"
      type: query
    - name: min_rating
      value: ""
      type: query
      description: Minimum rating (1-5)
      disabled: true
    - name: status
      value: ""
      type: query
      description: Station status (active, maintenance)
      disabled: true
    - name: is_24x7
      value: ""
      type: query
      description: Filter only 24x7 stations
      disabled: true
    - name: sort_by
      value: distance
      type: query
      description: "Sort by: distance, rating, availability"
    - name: battery_type
      value: ""
      type: query
      description: Filter by battery type (e.g., lithium_ion, lfp)
      disabled: true
    - name: min_capacity
      value: ""
      type: query
      description: Minimum battery capacity (mAh)
      disabled: true
    - name: max_price
      value: ""
      type: query
      description: Maximum daily rental price
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

