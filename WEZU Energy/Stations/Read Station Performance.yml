info:
  name: Read Station Performance
  type: http
  seq: 8
  tags:
    - Stations

http:
  method: GET
  url: "{{baseUrl}}/api/v1/stations/:station_id/performance"
  params:
    - name: station_id
      value: ""
      type: path
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/stations/:station_id/performance"
      method: GET
      params:
        - name: station_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "daily_rentals": 0,
            "daily_revenue": 0,
            "avg_duration_minutes": 0,
            "satisfaction_score": 0,
            "utilization_percentage": 0
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/stations/:station_id/performance"
      method: GET
      params:
        - name: station_id
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: "Station metrics: daily rentals, revenue, avg duration, etc."
