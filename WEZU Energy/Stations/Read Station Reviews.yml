info:
  name: Read Station Reviews
  type: http
  seq: 17
  tags:
    - Stations

http:
  method: GET
  url: "{{baseUrl}}/api/v1/stations/:station_id/reviews"
  params:
    - name: station_id
      value: ""
      type: path
    - name: skip
      value: "0"
      type: query
    - name: limit
      value: "50"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/stations/:station_id/reviews"
      method: GET
      params:
        - name: station_id
          value: ""
          type: path
        - name: skip
          value: "0"
          type: query
        - name: limit
          value: "50"
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "rating": 0,
              "comment": "",
              "id": 0,
              "user_id": 0,
              "created_at": "",
              "user_name": ""
            }
          ]
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/stations/:station_id/reviews"
      method: GET
      params:
        - name: station_id
          value: ""
          type: path
        - name: skip
          value: "0"
          type: query
        - name: limit
          value: "50"
          type: query
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
