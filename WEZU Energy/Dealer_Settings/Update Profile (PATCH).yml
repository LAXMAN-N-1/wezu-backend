info:
  name: Update Profile (PATCH)
  type: http
  seq: 2
  tags:
    - Dealer_Settings

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/dealer/portal/settings/profile"
  body:
    type: json
    data: |-
      {
        "business_name": "",
        "contact_person": "",
        "contact_email": "",
        "contact_phone": "",
        "address_line1": "",
        "city": "",
        "state": "",
        "pincode": "",
        "gst_number": "",
        "pan_number": "",
        "year_established": "",
        "website_url": "",
        "business_description": "",
        "alternate_phone": "",
        "whatsapp_number": "",
        "support_email": "",
        "support_phone": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

