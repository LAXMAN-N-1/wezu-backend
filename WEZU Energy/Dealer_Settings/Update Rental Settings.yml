info:
  name: Update Rental Settings
  type: http
  seq: 17
  tags:
    - Dealer_Settings

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/dealer/portal/settings/rental-settings"
  body:
    type: json
    data: |-
      {
        "daily_rate": "",
        "security_deposit": "",
        "late_fee_hourly": "",
        "grace_period_hours": "",
        "allow_extension": "",
        "allow_pause": "",
        "max_concurrent_rentals": "",
        "min_battery_checkout": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

