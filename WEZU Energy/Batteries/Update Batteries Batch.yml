info:
  name: Update Batteries Batch
  type: http
  seq: 21
  tags:
    - Batteries

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/batteries/batch/update"
  body:
    type: json
    data: |-
      [
        {}
      ]
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

