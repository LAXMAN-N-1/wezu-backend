info:
  name: Get Battery Utilization Report
  type: http
  seq: 11
  tags:
    - Batteries

http:
  method: GET
  url: "{{baseUrl}}/api/v1/batteries/utilization-report"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/batteries/utilization-report"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "total_batteries": 0,
            "available_count": 0,
            "rented_count": 0,
            "maintenance_count": 0,
            "retired_count": 0,
            "utilization_percentage": 0
          }

docs: Utilization percentage across fleet.
