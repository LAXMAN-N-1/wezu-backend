info:
  name: Get Battery Health History
  type: http
  seq: 2
  tags:
    - Batteries

http:
  method: GET
  url: "{{baseUrl}}/api/v1/batteries/:battery_id/health-history"
  params:
    - name: battery_id
      value: ""
      type: path
    - name: limit
      value: "50"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/batteries/:battery_id/health-history"
      method: GET
      params:
        - name: battery_id
          value: ""
          type: path
        - name: limit
          value: "50"
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "message": "",
            "data": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/batteries/:battery_id/health-history"
      method: GET
      params:
        - name: battery_id
          value: ""
          type: path
        - name: limit
          value: "50"
          type: query
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: Historical health percentage (SOH) readings over time.
