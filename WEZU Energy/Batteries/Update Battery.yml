info:
  name: Update Battery
  type: http
  seq: 16
  tags:
    - Batteries

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/batteries/:battery_id"
  params:
    - name: battery_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "status": "",
        "health_status": "",
        "health_percentage": "",
        "location_type": "",
        "station_id": "",
        "current_user_id": "",
        "manufacturer": "",
        "battery_type": "",
        "notes": "",
        "purchase_date": "",
        "warranty_expiry": "",
        "last_inspected_at": "",
        "description": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

