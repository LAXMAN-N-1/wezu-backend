info:
  name: Forgot Password
  type: http
  seq: 13
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/forgot-password"
  body:
    type: json
    data: |-
      {
        "phone_number": "",
        "email": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/auth/forgot-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "phone_number": "",
            "email": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/auth/forgot-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "phone_number": "",
            "email": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: |-
  Initiate password reset process.
  Sends 6-digit OTP to registered email or phone.
  OTP expires in 10 minutes.
