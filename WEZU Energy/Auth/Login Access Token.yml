info:
  name: Login Access Token
  type: http
  seq: 2
  tags:
    - Auth
    - authentication

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/token"
  body:
    type: form-urlencoded
    data:
      - name: grant_type
        value: ""
      - name: username
        value: ""
        description: Email or phone number
      - name: password
        value: ""
      - name: scope
        value: ""
      - name: client_id
        value: ""
      - name: client_secret
        value: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/auth/token"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: grant_type
            value: ""
          - name: username
            value: ""
            description: Email or phone number
          - name: password
            value: ""
          - name: scope
            value: ""
          - name: client_id
            value: ""
          - name: client_secret
            value: ""
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "access_token": "",
            "refresh_token": "",
            "token_type": "",
            "user": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/auth/token"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: grant_type
            value: ""
          - name: username
            value: ""
            description: Email or phone number
          - name: password
            value: ""
          - name: scope
            value: ""
          - name: client_id
            value: ""
          - name: client_secret
            value: ""
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: OAuth2 compatible token login, get an access token for future requests (uses 'email' as username)
