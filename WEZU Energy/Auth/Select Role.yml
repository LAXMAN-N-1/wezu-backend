info:
  name: Select Role
  type: http
  seq: 11
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/select-role"
  body:
    type: json
    data: |-
      {
        "role": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/auth/select-role"
      method: POST
      body:
        type: json
        data: |-
          {
            "role": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "message": "",
            "access_token": "",
            "refresh_token": "",
            "token_type": "",
            "user": "",
            "role": "",
            "permissions": [],
            "menu": [
              {
                "label": "",
                "icon": "",
                "path": "",
                "children": ""
              }
            ],
            "available_roles": [],
            "requires_role_selection": false
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/auth/select-role"
      method: POST
      body:
        type: json
        data: |-
          {
            "role": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: |-
  Select/Switch active role for the current user.
  Note: As of latest schema, User has single role. This endpoint validates the user has the requested role 
  and returns fresh tokens permissions.
