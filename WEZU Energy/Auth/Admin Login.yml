info:
  name: Admin Login
  type: http
  seq: 27
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/admin/login"
  body:
    type: json
    data: |-
      {
        "username": "",
        "password": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/auth/admin/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "username": "",
            "password": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/auth/admin/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "username": "",
            "password": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: |-
  Admin login endpoint (JSON body).
  Validates credentials and ensures the user has an admin-level role.
