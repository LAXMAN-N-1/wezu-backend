info:
  name: Verify Otp Alias
  type: http
  seq: 5
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/verify-otp"
  body:
    type: json
    data: |-
      {
        "target": "",
        "code": "",
        "purpose": "",
        "full_name": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/auth/verify-otp"
      method: POST
      body:
        type: json
        data: |-
          {
            "target": "",
            "code": "",
            "purpose": "",
            "full_name": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "access_token": "",
            "refresh_token": "",
            "token_type": "",
            "user": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/auth/verify-otp"
      method: POST
      body:
        type: json
        data: |-
          {
            "target": "",
            "code": "",
            "purpose": "",
            "full_name": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: |-
  Verify OTP and log in / activate account.
  (Alias for /register/verify-otp to match new requirements)
