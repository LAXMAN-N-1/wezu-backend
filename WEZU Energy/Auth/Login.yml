info:
  name: Login
  type: http
  seq: 10
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/login"
  body:
    type: json
    data: |-
      {
        "credential": "",
        "password": "",
        "totp_code": "",
        "role": "",
        "device_fingerprint": "",
        "remember_me": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "credential": "",
            "password": "",
            "totp_code": "",
            "role": "",
            "device_fingerprint": "",
            "remember_me": false
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "message": "",
            "access_token": "",
            "refresh_token": "",
            "token_type": "",
            "user": "",
            "role": "",
            "permissions": [],
            "menu": [
              {
                "label": "",
                "icon": "",
                "path": "",
                "children": ""
              }
            ],
            "available_roles": [],
            "requires_role_selection": false
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "credential": "",
            "password": "",
            "totp_code": "",
            "role": "",
            "device_fingerprint": "",
            "remember_me": false
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: Login with password. Supports multi-role users.
