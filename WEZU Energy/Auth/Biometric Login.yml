info:
  name: Biometric Login
  type: http
  seq: 23
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/biometric-login"
  body:
    type: json
    data: |-
      {
        "credential_id": "",
        "signature": "",
        "challenge": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/auth/biometric-login"
      method: POST
      body:
        type: json
        data: |-
          {
            "credential_id": "",
            "signature": "",
            "challenge": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "access_token": "",
            "refresh_token": "",
            "token_type": "",
            "user": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/auth/biometric-login"
      method: POST
      body:
        type: json
        data: |-
          {
            "credential_id": "",
            "signature": "",
            "challenge": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

