info:
  name: Register
  type: http
  seq: 1
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "",
        "password": "",
        "full_name": "",
        "phone_number": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/auth/register"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": "",
            "full_name": "",
            "phone_number": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "full_name": "",
            "email": "",
            "phone_number": "",
            "id": 0,
            "is_active": "",
            "is_superuser": false,
            "profile_picture": "",
            "kyc_status": "",
            "wallet_balance": 0,
            "addresses": [
              {
                "street_address": "",
                "city": "",
                "state": "",
                "postal_code": "",
                "country": "",
                "type": "",
                "latitude": "",
                "longitude": "",
                "is_default": false,
                "id": 0,
                "user_id": 0,
                "created_at": "",
                "updated_at": ""
              }
            ],
            "role": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/auth/register"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": "",
            "full_name": "",
            "phone_number": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: Register a new user with email or phone and password.
