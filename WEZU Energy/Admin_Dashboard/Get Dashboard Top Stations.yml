info:
  name: Get Dashboard Top Stations
  type: http
  seq: 5
  tags:
    - Admin_Dashboard

http:
  method: GET
  url: "{{baseUrl}}/api/v1/dashboard/top-stations"
  params:
    - name: limit
      value: "5"
      type: query
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/dashboard/top-stations"
      method: GET
      params:
        - name: limit
          value: "5"
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/dashboard/top-stations"
      method: GET
      params:
        - name: limit
          value: "5"
          type: query
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
