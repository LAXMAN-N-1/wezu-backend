info:
  name: Get Duplicate Accounts
  type: http
  seq: 117
  tags:
    - Admin_Core
    - Admin_Fraud

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/fraud/duplicate-accounts"
  params:
    - name: status
      value: ""
      type: query
      disabled: true
    - name: min_confidence
      value: "50"
      type: query
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/fraud/duplicate-accounts"
      method: GET
