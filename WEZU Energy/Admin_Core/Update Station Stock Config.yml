info:
  name: Update Station Stock Config
  type: http
  seq: 72
  tags:
    - Admin_Core
    - Admin_Stock_Levels

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/admin/stock/stations/:station_id/config"
  params:
    - name: station_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "max_capacity": "",
        "reorder_point": "",
        "reorder_quantity": "",
        "manager_email": "",
        "manager_phone": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/stock/stations/:station_id/config"
      method: PUT
      params:
        - name: station_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "max_capacity": "",
            "reorder_point": "",
            "reorder_quantity": "",
            "manager_email": "",
            "manager_phone": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "max_capacity": 0,
            "reorder_point": 0,
            "reorder_quantity": 0,
            "manager_email": "",
            "manager_phone": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/stock/stations/:station_id/config"
      method: PUT
      params:
        - name: station_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "max_capacity": "",
            "reorder_point": "",
            "reorder_quantity": "",
            "manager_email": "",
            "manager_phone": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

