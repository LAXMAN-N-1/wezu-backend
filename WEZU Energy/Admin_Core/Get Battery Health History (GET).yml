info:
  name: Get Battery Health History (GET)
  type: http
  seq: 66
  tags:
    - Admin_Core
    - Admin_Batteries

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/batteries/:battery_id/health-history"
  params:
    - name: battery_id
      value: ""
      type: path
    - name: days
      value: "90"
      type: query
      description: Number of days of history
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/batteries/:battery_id/health-history"
      method: GET
      params:
        - name: battery_id
          value: ""
          type: path
        - name: days
          value: "90"
          type: query
          description: Number of days of history
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 0,
              "battery_id": 0,
              "health_percentage": 0,
              "recorded_at": ""
            }
          ]
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/batteries/:battery_id/health-history"
      method: GET
      params:
        - name: battery_id
          value: ""
          type: path
        - name: days
          value: "90"
          type: query
          description: Number of days of history
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
