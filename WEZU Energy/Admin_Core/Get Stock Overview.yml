info:
  name: Get Stock Overview
  type: http
  seq: 68
  tags:
    - Admin_Core
    - Admin_Stock_Levels

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/stock/overview"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/stock/overview"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "total_batteries": 0,
            "total_stations": 0,
            "avg_utilization": 0,
            "low_stock_alerts": 0,
            "warehouse_count": 0,
            "service_count": 0,
            "available_count": 0,
            "rented_count": 0,
            "maintenance_count": 0
          }

docs: Fleet-wide stock summary
