info:
  name: Get Recent Executions
  type: http
  seq: 129
  tags:
    - Admin_Core
    - Admin_Jobs

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/jobs/executions/recent"
  params:
    - name: limit
      value: "100"
      type: query
    - name: status
      value: ""
      type: query
      disabled: true
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/jobs/executions/recent"
      method: GET
      params:
        - name: limit
          value: "100"
          type: query
        - name: status
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {}
          ]
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/jobs/executions/recent"
      method: GET
      params:
        - name: limit
          value: "100"
          type: query
        - name: status
          value: ""
          type: query
          disabled: true
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

