info:
  name: Create Banner
  type: http
  seq: 35
  tags:
    - Admin_Core
    - Admin_CMS

http:
  method: POST
  url: "{{baseUrl}}/api/v1/admin/cms/banners/"
  body:
    type: json
    data: |-
      {
        "title": "",
        "image_url": "",
        "deep_link": "",
        "external_url": "",
        "priority": 0,
        "is_active": false,
        "start_date": "",
        "end_date": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/cms/banners/"
      method: POST
      body:
        type: json
        data: |-
          {
            "title": "",
            "image_url": "",
            "deep_link": "",
            "external_url": "",
            "priority": 0,
            "is_active": false,
            "start_date": "",
            "end_date": ""
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "title": "",
            "image_url": "",
            "deep_link": "",
            "external_url": "",
            "priority": 0,
            "is_active": false,
            "start_date": "",
            "end_date": "",
            "id": 0,
            "click_count": 0,
            "created_at": "",
            "updated_at": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/cms/banners/"
      method: POST
      body:
        type: json
        data: |-
          {
            "title": "",
            "image_url": "",
            "deep_link": "",
            "external_url": "",
            "priority": 0,
            "is_active": false,
            "start_date": "",
            "end_date": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
