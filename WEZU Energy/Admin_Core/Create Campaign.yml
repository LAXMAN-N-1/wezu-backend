info:
  name: Create Campaign
  type: http
  seq: 182
  tags:
    - Admin_Core
    - Admin_Notifications

http:
  method: POST
  url: "{{baseUrl}}/api/v1/admin/notifications/campaigns"
  body:
    type: json
    data: |-
      {
        "title": "",
        "message": "",
        "target_segment": "",
        "channel": "",
        "scheduled_at": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/notifications/campaigns"
      method: POST
      body:
        type: json
        data: |-
          {
            "title": "",
            "message": "",
            "target_segment": "",
            "channel": "",
            "scheduled_at": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "title": "",
            "message": "",
            "target_segment": "",
            "target_count": 0,
            "channel": "",
            "status": "",
            "scheduled_at": "",
            "sent_at": "",
            "sent_count": 0,
            "delivered_count": 0,
            "open_count": 0,
            "click_count": 0,
            "failed_count": 0,
            "created_by": "",
            "created_at": "",
            "updated_at": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/notifications/campaigns"
      method: POST
      body:
        type: json
        data: |-
          {
            "title": "",
            "message": "",
            "target_segment": "",
            "channel": "",
            "scheduled_at": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
