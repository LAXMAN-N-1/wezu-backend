info:
  name: List Jobs
  type: http
  seq: 123
  tags:
    - Admin_Core
    - Admin_Jobs

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/jobs/"
  params:
    - name: is_active
      value: ""
      type: query
      disabled: true
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/jobs/"
      method: GET
      params:
        - name: is_active
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "job_name": "",
              "job_type": "",
              "schedule_cron": "",
              "is_active": false,
              "is_critical": false,
              "max_retries": 0,
              "retry_delay_seconds": 0,
              "timeout_seconds": 0,
              "alert_on_failure": false,
              "alert_emails": "",
              "description": "",
              "created_at": "",
              "updated_at": ""
            }
          ]
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/jobs/"
      method: GET
      params:
        - name: is_active
          value: ""
          type: query
          disabled: true
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

