info:
  name: Create Grid Event
  type: http
  seq: 177
  tags:
    - Admin_Core
    - Admin_BESS

http:
  method: POST
  url: "{{baseUrl}}/api/v1/admin/bess/grid-events"
  body:
    type: json
    data: |-
      {
        "bess_unit_id": 0,
        "event_type": "",
        "start_time": "",
        "end_time": "",
        "target_power_kw": 0,
        "grid_operator": "",
        "notes": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/bess/grid-events"
      method: POST
      body:
        type: json
        data: |-
          {
            "bess_unit_id": 0,
            "event_type": "",
            "start_time": "",
            "end_time": "",
            "target_power_kw": 0,
            "grid_operator": "",
            "notes": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "bess_unit_id": 0,
            "event_type": "",
            "start_time": "",
            "end_time": "",
            "target_power_kw": 0,
            "grid_operator": "",
            "notes": "",
            "id": 0,
            "status": "",
            "actual_power_kw": "",
            "energy_kwh": "",
            "revenue_earned": "",
            "created_at": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/bess/grid-events"
      method: POST
      body:
        type: json
        data: |-
          {
            "bess_unit_id": 0,
            "event_type": "",
            "start_time": "",
            "end_time": "",
            "target_power_kw": 0,
            "grid_operator": "",
            "notes": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
