info:
  name: List Reports
  type: http
  seq: 179
  tags:
    - Admin_Core
    - Admin_BESS

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/bess/reports"
  params:
    - name: report_type
      value: ""
      type: query
      disabled: true
    - name: bess_unit_id
      value: ""
      type: query
      disabled: true
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/bess/reports"
      method: GET
      params:
        - name: report_type
          value: ""
          type: query
          disabled: true
        - name: bess_unit_id
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 0,
              "bess_unit_id": "",
              "report_type": "",
              "period_start": "",
              "period_end": "",
              "total_charged_kwh": 0,
              "total_discharged_kwh": 0,
              "avg_efficiency": 0,
              "peak_power_kw": 0,
              "avg_soc": 0,
              "min_soc": 0,
              "max_soc": 0,
              "revenue": 0,
              "cost": 0,
              "grid_events_count": 0,
              "created_at": ""
            }
          ]
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/bess/reports"
      method: GET
      params:
        - name: report_type
          value: ""
          type: query
          disabled: true
        - name: bess_unit_id
          value: ""
          type: query
          disabled: true
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
