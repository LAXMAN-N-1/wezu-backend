info:
  name: Get Health Batteries
  type: http
  seq: 77
  tags:
    - Admin_Core
    - Admin_Battery_Health

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/health/batteries"
  params:
    - name: health_range
      value: ""
      type: query
      description: good/fair/poor/critical
      disabled: true
    - name: sort_by
      value: health_desc
      type: query
      description: health_asc/health_desc/degradation_rate/last_service
    - name: needs_attention
      value: ""
      type: query
      disabled: true
    - name: search
      value: ""
      type: query
      disabled: true
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "50"
      type: query
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

