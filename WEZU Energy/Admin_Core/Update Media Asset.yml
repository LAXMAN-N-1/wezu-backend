info:
  name: Update Media Asset
  type: http
  seq: 44
  tags:
    - Admin_Core
    - Admin_CMS

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/admin/cms/media/:asset_id"
  params:
    - name: asset_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "alt_text": "",
        "category": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/cms/media/:asset_id"
      method: PATCH
      params:
        - name: asset_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "alt_text": "",
            "category": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "file_name": "",
            "file_type": "",
            "file_size_bytes": 0,
            "url": "",
            "alt_text": "",
            "category": "",
            "id": 0,
            "uploaded_by_id": 0,
            "created_at": "",
            "updated_at": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/cms/media/:asset_id"
      method: PATCH
      params:
        - name: asset_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "alt_text": "",
            "category": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
