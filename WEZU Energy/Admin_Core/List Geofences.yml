info:
  name: List Geofences
  type: http
  seq: 110
  tags:
    - Admin_Core
    - Admin_IoT

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/iot/geofences"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/iot/geofences"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "name": "",
              "latitude": 0,
              "longitude": 0,
              "radius_meters": 0,
              "type": "",
              "polygon_coords": "",
              "is_active": false,
              "created_at": ""
            }
          ]

docs: List all configured geofences.
