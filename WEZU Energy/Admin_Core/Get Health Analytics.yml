info:
  name: Get Health Analytics
  type: http
  seq: 85
  tags:
    - Admin_Core
    - Admin_Battery_Health

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/health/analytics"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/health/analytics"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "fleet_trend": [
              {
                "date": "",
                "avg_health": 0
              }
            ],
            "health_distribution": {},
            "worst_degraders": [
              {
                "battery_id": "",
                "serial_number": "",
                "degradation_rate": 0,
                "current_health": 0
              }
            ],
            "maintenance_compliance_rate": 0
          }
