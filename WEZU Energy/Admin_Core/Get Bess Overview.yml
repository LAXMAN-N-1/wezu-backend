info:
  name: Get Bess Overview
  type: http
  seq: 170
  tags:
    - Admin_Core
    - Admin_BESS

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/bess/overview"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/bess/overview"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "total_units": 0,
            "online_units": 0,
            "total_capacity_kwh": 0,
            "current_stored_kwh": 0,
            "avg_soc": 0,
            "avg_soh": 0,
            "total_energy_today_kwh": 0,
            "total_revenue_today": 0
          }

docs: Aggregate dashboard stats for BESS overview.
