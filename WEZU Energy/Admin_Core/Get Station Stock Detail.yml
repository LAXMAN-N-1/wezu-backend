info:
  name: Get Station Stock Detail
  type: http
  seq: 71
  tags:
    - Admin_Core
    - Admin_Stock_Levels

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/stock/stations/:station_id"
  params:
    - name: station_id
      value: ""
      type: path
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/stock/stations/:station_id"
      method: GET
      params:
        - name: station_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "station": {
              "station_id": 0,
              "station_name": "",
              "address": "",
              "latitude": 0,
              "longitude": 0,
              "available_count": 0,
              "rented_count": 0,
              "maintenance_count": 0,
              "total_assigned": 0,
              "utilization_percentage": 0,
              "is_low_stock": false,
              "config": ""
            },
            "forecast": {
              "avg_rentals_per_day": 0,
              "projected_demand_30d": 0,
              "recommended_reorder": 0,
              "recommended_date": "",
              "predicted_stockout_days": ""
            },
            "batteries": [
              {}
            ],
            "utilization_trend": []
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/stock/stations/:station_id"
      method: GET
      params:
        - name: station_id
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: Deep detail for a specific station including 30-day forecast mock
