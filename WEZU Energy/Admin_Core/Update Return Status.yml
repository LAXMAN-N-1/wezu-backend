info:
  name: Update Return Status
  type: http
  seq: 154
  tags:
    - Admin_Core
    - Admin_Logistics

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/admin/logistics/returns/:return_id/status"
  params:
    - name: return_id
      value: ""
      type: path
    - name: new_status
      value: ""
      type: query
    - name: notes
      value: ""
      type: query
      disabled: true
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

