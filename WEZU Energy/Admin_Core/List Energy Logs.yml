info:
  name: List Energy Logs
  type: http
  seq: 174
  tags:
    - Admin_Core
    - Admin_BESS

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/bess/energy-logs"
  params:
    - name: bess_unit_id
      value: ""
      type: query
      disabled: true
    - name: source
      value: ""
      type: query
      disabled: true
    - name: hours
      value: "24"
      type: query
      description: Hours of data to fetch
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/bess/energy-logs"
      method: GET
      params:
        - name: bess_unit_id
          value: ""
          type: query
          disabled: true
        - name: source
          value: ""
          type: query
          disabled: true
        - name: hours
          value: "24"
          type: query
          description: Hours of data to fetch
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 0,
              "bess_unit_id": 0,
              "timestamp": "",
              "power_kw": 0,
              "energy_kwh": 0,
              "soc_start": 0,
              "soc_end": 0,
              "source": "",
              "voltage": "",
              "current_a": "",
              "temperature_c": ""
            }
          ]
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/bess/energy-logs"
      method: GET
      params:
        - name: bess_unit_id
          value: ""
          type: query
          disabled: true
        - name: source
          value: ""
          type: query
          disabled: true
        - name: hours
          value: "24"
          type: query
          description: Hours of data to fetch
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
