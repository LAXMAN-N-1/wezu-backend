info:
  name: Get Command History
  type: http
  seq: 109
  tags:
    - Admin_Core
    - Admin_IoT

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/iot/commands/history"
  params:
    - name: device_id
      value: ""
      type: query
      disabled: true
    - name: limit
      value: "50"
      type: query
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/iot/commands/history"
      method: GET
      params:
        - name: device_id
          value: ""
          type: query
          disabled: true
        - name: limit
          value: "50"
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "device_id": 0,
              "command_type": "",
              "payload": "",
              "status": "",
              "created_at": "",
              "sent_at": "",
              "executed_at": "",
              "response_data": ""
            }
          ]
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/iot/commands/history"
      method: GET
      params:
        - name: device_id
          value: ""
          type: query
          disabled: true
        - name: limit
          value: "50"
          type: query
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: Get history of commands sent to devices.
