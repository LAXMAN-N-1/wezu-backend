info:
  name: Handle Duplicate Account
  type: http
  seq: 122
  tags:
    - Admin_Core
    - Admin_Fraud

http:
  method: POST
  url: "{{baseUrl}}/api/v1/admin/fraud/duplicate-accounts/:id/action"
  params:
    - name: id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "action": "",
        "notes": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

