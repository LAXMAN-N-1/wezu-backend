info:
  name: List Banners
  type: http
  seq: 34
  tags:
    - Admin_Core
    - Admin_CMS

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/cms/banners/"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/cms/banners/"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "title": "",
              "image_url": "",
              "deep_link": "",
              "external_url": "",
              "priority": 0,
              "is_active": false,
              "start_date": "",
              "end_date": "",
              "id": 0,
              "click_count": 0,
              "created_at": "",
              "updated_at": ""
            }
          ]
