info:
  name: Get Health Alerts
  type: http
  seq: 81
  tags:
    - Admin_Core
    - Admin_Battery_Health

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/health/alerts"
  params:
    - name: severity
      value: ""
      type: query
      disabled: true
    - name: battery_id
      value: ""
      type: query
      disabled: true
    - name: alert_type
      value: ""
      type: query
      disabled: true
    - name: include_resolved
      value: "false"
      type: query
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/health/alerts"
      method: GET
      params:
        - name: severity
          value: ""
          type: query
          disabled: true
        - name: battery_id
          value: ""
          type: query
          disabled: true
        - name: alert_type
          value: ""
          type: query
          disabled: true
        - name: include_resolved
          value: "false"
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 0,
              "battery_id": "",
              "battery_serial": "",
              "alert_type": "",
              "severity": "",
              "message": "",
              "is_resolved": false,
              "resolved_by": "",
              "resolved_at": "",
              "resolution_reason": "",
              "created_at": ""
            }
          ]
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/health/alerts"
      method: GET
      params:
        - name: severity
          value: ""
          type: query
          disabled: true
        - name: battery_id
          value: ""
          type: query
          disabled: true
        - name: alert_type
          value: ""
          type: query
          disabled: true
        - name: include_resolved
          value: "false"
          type: query
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
