info:
  name: Get Stations Stock
  type: http
  seq: 69
  tags:
    - Admin_Core
    - Admin_Stock_Levels

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/stock/stations"
  params:
    - name: alert_only
      value: "false"
      type: query
    - name: sort_by
      value: utilization
      type: query
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/stock/stations"
      method: GET
      params:
        - name: alert_only
          value: "false"
          type: query
        - name: sort_by
          value: utilization
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "station_id": 0,
              "station_name": "",
              "address": "",
              "latitude": 0,
              "longitude": 0,
              "available_count": 0,
              "rented_count": 0,
              "maintenance_count": 0,
              "total_assigned": 0,
              "utilization_percentage": 0,
              "is_low_stock": false,
              "config": ""
            }
          ]
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/stock/stations"
      method: GET
      params:
        - name: alert_only
          value: "false"
          type: query
        - name: sort_by
          value: utilization
          type: query
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

