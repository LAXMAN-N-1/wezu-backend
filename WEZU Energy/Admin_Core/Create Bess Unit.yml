info:
  name: Create Bess Unit
  type: http
  seq: 172
  tags:
    - Admin_Core
    - Admin_BESS

http:
  method: POST
  url: "{{baseUrl}}/api/v1/admin/bess/units"
  body:
    type: json
    data: |-
      {
        "name": "",
        "location": "",
        "capacity_kwh": 0,
        "max_power_kw": 0,
        "manufacturer": "",
        "model_number": "",
        "status": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/bess/units"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "location": "",
            "capacity_kwh": 0,
            "max_power_kw": 0,
            "manufacturer": "",
            "model_number": "",
            "status": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "name": "",
            "location": "",
            "capacity_kwh": 0,
            "max_power_kw": 0,
            "manufacturer": "",
            "model_number": "",
            "id": 0,
            "current_charge_kwh": 0,
            "status": "",
            "soc": 0,
            "soh": 0,
            "temperature_c": 0,
            "cycle_count": 0,
            "firmware_version": "",
            "installed_at": "",
            "last_maintenance_at": "",
            "created_at": "",
            "updated_at": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/bess/units"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "location": "",
            "capacity_kwh": 0,
            "max_power_kw": 0,
            "manufacturer": "",
            "model_number": "",
            "status": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
