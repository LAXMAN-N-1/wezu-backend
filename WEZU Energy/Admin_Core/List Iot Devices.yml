info:
  name: List Iot Devices
  type: http
  seq: 107
  tags:
    - Admin_Core
    - Admin_IoT

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/iot/devices"
  params:
    - name: skip
      value: "0"
      type: query
    - name: limit
      value: "20"
      type: query
    - name: status
      value: ""
      type: query
      disabled: true
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/iot/devices"
      method: GET
      params:
        - name: skip
          value: "0"
          type: query
        - name: limit
          value: "20"
          type: query
        - name: status
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "device_id": "",
              "device_type": "",
              "firmware_version": "",
              "status": "",
              "communication_protocol": "",
              "battery_id": "",
              "auth_token": "",
              "last_heartbeat": "",
              "last_ip_address": "",
              "created_at": "",
              "updated_at": ""
            }
          ]
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/iot/devices"
      method: GET
      params:
        - name: skip
          value: "0"
          type: query
        - name: limit
          value: "20"
          type: query
        - name: status
          value: ""
          type: query
          disabled: true
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: List all IoT devices with optional status filtering.
