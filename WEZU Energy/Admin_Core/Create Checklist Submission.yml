info:
  name: Create Checklist Submission
  type: http
  seq: 22
  tags:
    - Admin_Core
    - Admin_Stations

http:
  method: POST
  url: "{{baseUrl}}/api/v1/admin/stations/maintenance/checklists/submissions"
  body:
    type: json
    data: |-
      {
        "event_id": "",
        "template_id": "",
        "template_version": 0,
        "completed_tasks": [
          {}
        ],
        "submitted_by": "",
        "submitted_at": "",
        "is_final": false
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/stations/maintenance/checklists/submissions"
      method: POST
      body:
        type: json
        data: |-
          {
            "event_id": "",
            "template_id": "",
            "template_version": 0,
            "completed_tasks": [
              {}
            ],
            "submitted_by": "",
            "submitted_at": "",
            "is_final": false
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/stations/maintenance/checklists/submissions"
      method: POST
      body:
        type: json
        data: |-
          {
            "event_id": "",
            "template_id": "",
            "template_version": 0,
            "completed_tasks": [
              {}
            ],
            "submitted_by": "",
            "submitted_at": "",
            "is_final": false
          }
    response:
      status: 422
