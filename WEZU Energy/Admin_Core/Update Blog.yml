info:
  name: Update Blog
  type: http
  seq: 32
  tags:
    - Admin_Core
    - Admin_CMS

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/admin/cms/blogs/:blog_id"
  params:
    - name: blog_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "title": "",
        "slug": "",
        "content": "",
        "summary": "",
        "featured_image_url": "",
        "category": "",
        "status": "",
        "published_at": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/cms/blogs/:blog_id"
      method: PUT
      params:
        - name: blog_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "title": "",
            "slug": "",
            "content": "",
            "summary": "",
            "featured_image_url": "",
            "category": "",
            "status": "",
            "published_at": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "title": "",
            "slug": "",
            "content": "",
            "summary": "",
            "featured_image_url": "",
            "category": "",
            "author_id": 0,
            "status": "",
            "published_at": "",
            "id": 0,
            "views_count": 0,
            "created_at": "",
            "updated_at": ""
          }
