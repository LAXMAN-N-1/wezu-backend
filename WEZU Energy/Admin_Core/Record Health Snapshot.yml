info:
  name: Record Health Snapshot
  type: http
  seq: 80
  tags:
    - Admin_Core
    - Admin_Battery_Health

http:
  method: POST
  url: "{{baseUrl}}/api/v1/admin/health/batteries/:battery_id/snapshot"
  params:
    - name: battery_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "health_percentage": 0,
        "voltage": "",
        "temperature": "",
        "internal_resistance": "",
        "notes": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/health/batteries/:battery_id/snapshot"
      method: POST
      params:
        - name: battery_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "health_percentage": 0,
            "voltage": "",
            "temperature": "",
            "internal_resistance": "",
            "notes": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "health_percentage": 0,
            "voltage": "",
            "temperature": "",
            "internal_resistance": "",
            "charge_cycles": "",
            "snapshot_type": "",
            "recorded_at": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/health/batteries/:battery_id/snapshot"
      method: POST
      params:
        - name: battery_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "health_percentage": 0,
            "voltage": "",
            "temperature": "",
            "internal_resistance": "",
            "notes": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
