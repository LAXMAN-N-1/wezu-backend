info:
  name: Get Health Battery Detail
  type: http
  seq: 78
  tags:
    - Admin_Core
    - Admin_Battery_Health

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/health/batteries/:battery_id"
  params:
    - name: battery_id
      value: ""
      type: path
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/health/batteries/:battery_id"
      method: GET
      params:
        - name: battery_id
          value: ""
          type: path
    response:
