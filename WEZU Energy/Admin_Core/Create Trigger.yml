info:
  name: Create Trigger
  type: http
  seq: 186
  tags:
    - Admin_Core
    - Admin_Notifications

http:
  method: POST
  url: "{{baseUrl}}/api/v1/admin/notifications/triggers"
  body:
    type: json
    data: |-
      {
        "name": "",
        "description": "",
        "event_type": "",
        "channel": "",
        "template_message": "",
        "delay_minutes": 0,
        "is_active": false
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/notifications/triggers"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "description": "",
            "event_type": "",
            "channel": "",
            "template_message": "",
            "delay_minutes": 0,
            "is_active": false
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "name": "",
            "description": "",
            "event_type": "",
            "channel": "",
            "template_message": "",
            "delay_minutes": 0,
            "is_active": false,
            "trigger_count": 0,
            "last_triggered_at": "",
            "created_at": "",
            "updated_at": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/notifications/triggers"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "description": "",
            "event_type": "",
            "channel": "",
            "template_message": "",
            "delay_minutes": 0,
            "is_active": false
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
