info:
  name: Get Battery Snapshots
  type: http
  seq: 79
  tags:
    - Admin_Core
    - Admin_Battery_Health

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/health/batteries/:battery_id/snapshots"
  params:
    - name: battery_id
      value: ""
      type: path
    - name: days
      value: "90"
      type: query
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/health/batteries/:battery_id/snapshots"
      method: GET
      params:
        - name: battery_id
          value: ""
          type: path
        - name: days
          value: "90"
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 0,
              "health_percentage": 0,
              "voltage": "",
              "temperature": "",
              "internal_resistance": "",
              "charge_cycles": "",
              "snapshot_type": "",
              "recorded_at": ""
            }
          ]
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/health/batteries/:battery_id/snapshots"
      method: GET
      params:
        - name: battery_id
          value: ""
          type: path
        - name: days
          value: "90"
          type: query
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
