info:
  name: Create Maintenance Record
  type: http
  seq: 15
  tags:
    - Admin_Core
    - Admin_Stations

http:
  method: POST
  url: "{{baseUrl}}/api/v1/admin/stations/maintenance/create"
  body:
    type: json
    data: |-
      {
        "entity_type": "",
        "entity_id": 0,
        "maintenance_type": "",
        "description": "",
        "cost": 0,
        "parts_replaced": "",
        "status": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

