info:
  name: Get Active Stock Alerts
  type: http
  seq: 74
  tags:
    - Admin_Core
    - Admin_Stock_Levels

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/stock/alerts"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/stock/alerts"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "station_id": 0,
              "station_name": "",
              "current_count": 0,
              "capacity": 0,
              "threshold": 0,
              "utilization_percentage": 0
            }
          ]

docs: Return all active low-stock alerts
