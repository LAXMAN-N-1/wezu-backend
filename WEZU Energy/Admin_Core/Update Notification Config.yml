info:
  name: Update Notification Config
  type: http
  seq: 193
  tags:
    - Admin_Core
    - Admin_Notifications

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/admin/notifications/config/:config_id"
  params:
    - name: config_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "display_name": "",
        "api_key": "",
        "api_secret": "",
        "sender_id": "",
        "is_active": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/notifications/config/:config_id"
      method: PATCH
      params:
        - name: config_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "display_name": "",
            "api_key": "",
            "api_secret": "",
            "sender_id": "",
            "is_active": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "provider": "",
            "channel": "",
            "display_name": "",
            "api_key": "",
            "sender_id": "",
            "is_active": false,
            "last_tested_at": "",
            "test_status": "",
            "created_at": "",
            "updated_at": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/notifications/config/:config_id"
      method: PATCH
      params:
        - name: config_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "display_name": "",
            "api_key": "",
            "api_secret": "",
            "sender_id": "",
            "is_active": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
