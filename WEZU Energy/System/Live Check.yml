info:
  name: Live Check
  type: http
  seq: 1
  tags:
    - System

http:
  method: GET
  url: "{{baseUrl}}/live"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/live"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""

docs: Cheap liveness probe for container and reverse-proxy health checks.
