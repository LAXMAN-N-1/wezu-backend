info:
  name: Mark Faq Helpful
  type: http
  seq: 4
  tags:
    - FAQs

http:
  method: POST
  url: "{{baseUrl}}/api/v1/faqs/:id/helpful"
  params:
    - name: id
      value: ""
      type: path
    - name: is_helpful
      value: "true"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/faqs/:id/helpful"
      method: POST
      params:
        - name: id
          value: ""
          type: path
        - name: is_helpful
          value: "true"
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/faqs/:id/helpful"
      method: POST
      params:
        - name: id
          value: ""
          type: path
        - name: is_helpful
          value: "true"
          type: query
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: "User: mark article as helpful or not (for analytics)"
