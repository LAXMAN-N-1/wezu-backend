        data: |-
          {
            "document_type": "",
            "document_number": "",
            "id": 0,
            "user_id": 0,
            "file_url": "",
            "status": "",
            "uploaded_at": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/kyc/documents/:doc_id/reject"
      method: POST
      params:
        - name: doc_id
          value: ""
          type: path
      body:
        type: json
