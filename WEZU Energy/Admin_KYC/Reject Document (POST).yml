info:
  name: Reject Document (POST)
  type: http
  seq: 6
  tags:
    - Admin_KYC

http:
  method: POST
  url: "{{baseUrl}}/api/v1/admin/kyc/documents/:doc_id/reject"
  params:
    - name: doc_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "reason": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/kyc/documents/:doc_id/reject"
