info:
  name: Get Kyc Admin Dashboard
  type: http
  seq: 10
  tags:
    - Admin_KYC

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/kyc/dashboard"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/kyc/dashboard"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "total_pending": 0,
            "total_approved_today": 0,
            "total_rejected_today": 0,
            "submission_trend": {}
          }

docs: "Admin: KYC status counts (pending, approved, rejected today)"
