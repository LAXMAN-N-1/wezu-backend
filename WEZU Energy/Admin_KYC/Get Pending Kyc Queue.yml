info:
  name: Get Pending Kyc Queue
  type: http
  seq: 1
  tags:
    - Admin_KYC

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/kyc/pending"
  params:
    - name: page
      value: "1"
      type: query
    - name: size
      value: "10"
      type: query
    - name: user_type
      value: ""
      type: query
      disabled: true
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/kyc/pending"
      method: GET
      params:
        - name: page
          value: "1"
          type: query
        - name: size
          value: "10"
          type: query
        - name: user_type
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "items": [
              {
                "user_id": 0,
                "full_name": "",
                "email": "",
                "phone_number": "",
                "user_type": "",
                "submitted_at": "",
                "documents": [
                  {
                    "document_type": "",
                    "document_number": "",
                    "id": 0,
                    "user_id": 0,
                    "file_url": "",
                    "status": "",
                    "uploaded_at": ""
                  }
                ]
              }
            ],
            "total": 0,
            "page": 0,
            "size": 0
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/kyc/pending"
      method: GET
      params:
        - name: page
          value: "1"
          type: query
        - name: size
          value: "10"
          type: query
        - name: user_type
          value: ""
          type: query
          disabled: true
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: List all users with pending KYC verification.
