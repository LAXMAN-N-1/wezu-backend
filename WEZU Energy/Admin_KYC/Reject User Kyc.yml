info:
  name: Reject User Kyc
  type: http
  seq: 8
  tags:
    - Admin_KYC

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/admin/kyc/:user_id/reject"
  params:
    - name: user_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "reason": "",
        "rejection_reasons": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

