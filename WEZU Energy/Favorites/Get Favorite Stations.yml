info:
  name: Get Favorite Stations
  type: http
  seq: 1
  tags:
    - Favorites

http:
  method: GET
  url: "{{baseUrl}}/api/v1/favorites/stations"
  params:
    - name: lat
      value: ""
      type: query
      disabled: true
    - name: lon
      value: ""
      type: query
      disabled: true
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/favorites/stations"
      method: GET
      params:
        - name: lat
          value: ""
          type: query
          disabled: true
        - name: lon
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "name": "",
              "address": "",
              "city": "",
              "latitude": 0,
              "longitude": 0,
              "status": "",
              "contact_phone": "",
              "operating_hours": "",
              "is_24x7": false,
              "amenities": "",
              "station_type": "",
              "total_slots": 0,
              "power_rating_kw": "",
              "zone_id": "",
              "dealer_id": "",
              "id": 0,
              "rating": 0,
              "total_reviews": 0,
              "available_batteries": 0,
              "available_slots": 0,
              "images": [
                {
                  "url": "",
                  "is_primary": false
                }
              ],
              "distance": 0
            }
          ]
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/favorites/stations"
      method: GET
      params:
        - name: lat
          value: ""
          type: query
          disabled: true
        - name: lon
          value: ""
          type: query
          disabled: true
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: List user's favorited stations with distance and availability
