info:
  name: Read User Me
  type: http
  seq: 3
  tags:
    - Users

http:
  method: GET
  url: "{{baseUrl}}/api/v1/users/me"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/users/me"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "full_name": "",
            "email": "",
            "phone_number": "",
            "profile_picture": "",
            "address_line_1": "",
            "address_line_2": "",
            "city": "",
            "state": "",
            "pin_code": "",
            "country": "",
            "date_of_birth": "",
            "gender": "",
            "preferred_language": "",
            "is_active": "",
            "is_superuser": false,
            "kyc_status": "",
            "current_role": "",
            "available_roles": [],
            "permissions": [],
            "menu": [
              {
                "id": "",
                "label": "",
                "icon": "",
                "route": "",
                "order": 0,
                "enabled": false,
                "submenu": "",
                "permission": ""
              }
            ],
            "wallet_balance": 0,
            "staff_assignment": "",
            "profile_completion_percentage": 0,
            "created_at": "",
            "updated_at": ""
          }

