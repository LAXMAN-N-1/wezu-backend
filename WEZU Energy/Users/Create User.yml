info:
  name: Create User
  type: http
  seq: 1
  tags:
    - Users

http:
  method: POST
  url: "{{baseUrl}}/api/v1/users/"
  body:
    type: json
    data: |-
      {
        "full_name": "",
        "email": "",
        "phone_number": "",
        "password": "",
        "is_active": false,
        "role_id": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/users/"
      method: POST
      body:
        type: json
        data: |-
          {
            "full_name": "",
            "email": "",
            "phone_number": "",
            "password": "",
            "is_active": false,
            "role_id": ""
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "full_name": "",
            "email": "",
            "phone_number": "",
            "id": 0,
            "is_active": "",
            "is_superuser": false,
            "profile_picture": "",
            "kyc_status": "",
            "wallet_balance": 0,
            "addresses": [
              {
                "street_address": "",
                "city": "",
                "state": "",
                "postal_code": "",
                "country": "",
                "type": "",
                "latitude": "",
                "longitude": "",
                "is_default": false,
                "id": 0,
                "user_id": 0,
                "created_at": "",
                "updated_at": ""
              }
            ],
            "role": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/users/"
      method: POST
      body:
        type: json
        data: |-
          {
            "full_name": "",
            "email": "",
            "phone_number": "",
            "password": "",
            "is_active": false,
            "role_id": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: Create a new user. Only accessible by superusers.
