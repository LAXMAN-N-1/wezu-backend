info:
  name: Update User Status
  type: http
  seq: 27
  tags:
    - Users

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/users/:user_id/status"
  params:
    - name: user_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "status": "",
        "reason": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

