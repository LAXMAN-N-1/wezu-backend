info:
  name: Get My Sessions
  type: http
  seq: 29
  tags:
    - Users

http:
  method: GET
  url: "{{baseUrl}}/api/v1/users/me/sessions"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/users/me/sessions"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 0,
              "ip_address": "",
              "user_agent": "",
              "location": "",
              "device_type": "",
              "is_active": false,
              "last_active_at": "",
              "created_at": "",
              "is_current": false
            }
          ]

docs: Get active login sessions for current user.
