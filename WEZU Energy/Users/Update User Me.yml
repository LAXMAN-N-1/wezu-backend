info:
  name: Update User Me
  type: http
  seq: 4
  tags:
    - Users

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/users/me"
  body:
    type: json
    data: |-
      {
        "full_name": "",
        "email": "",
        "profile_picture": "",
        "is_active": "",
        "role_id": "",
        "address_line_1": "",
        "address_line_2": "",
        "city": "",
        "state": "",
        "pin_code": "",
        "country": "",
        "date_of_birth": "",
        "gender": "",
        "preferred_language": "",
        "emergency_contact": "",
        "notification_preferences": "",
        "security_question": "",
        "security_answer": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

