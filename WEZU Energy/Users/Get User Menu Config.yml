info:
  name: Get User Menu Config
  type: http
  seq: 12
  tags:
    - Users

http:
  method: GET
  url: "{{baseUrl}}/api/v1/users/me/menu-config"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/users/me/menu-config"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "menu": [
              {
                "id": "",
                "label": "",
                "icon": "",
                "route": "",
                "order": 0,
                "enabled": false,
                "submenu": "",
                "permission": ""
              }
            ]
          }

docs: Generate dynamic menu configuration based on user permissions.
