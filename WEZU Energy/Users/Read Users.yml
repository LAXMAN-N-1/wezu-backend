info:
  name: Read Users
  type: http
  seq: 2
  tags:
    - Users

http:
  method: GET
  url: "{{baseUrl}}/api/v1/users/"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "20"
      type: query
    - name: sort_by
      value: created_at
      type: query
    - name: sort_order
      value: desc
      type: query
    - name: role
      value: ""
      type: query
      disabled: true
    - name: status
      value: ""
      type: query
      disabled: true
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/users/"
      method: GET
      params:
        - name: page
          value: "1"
          type: query
        - name: limit
          value: "20"
          type: query
        - name: sort_by
          value: created_at
          type: query
        - name: sort_order
          value: desc
          type: query
        - name: role
          value: ""
          type: query
          disabled: true
        - name: status
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "users": [
              {
                "id": 0,
                "full_name": "",
                "email": "",
                "phone_number": "",
                "profile_picture": "",
                "is_active": "",
                "kyc_status": "",
                "roles": [],
                "created_at": "",
                "last_login": ""
              }
            ],
            "total_count": 0,
            "page": 0,
            "limit": 0,
            "filters_applied": {}
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/users/"
      method: GET
      params:
        - name: page
          value: "1"
          type: query
        - name: limit
          value: "20"
