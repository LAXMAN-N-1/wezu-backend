info:
  name: Read Addresses
  type: http
  seq: 10
  tags:
    - Users

http:
  method: GET
  url: "{{baseUrl}}/api/v1/users/me/addresses"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/users/me/addresses"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "street_address": "",
              "city": "",
              "state": "",
              "postal_code": "",
              "country": "",
              "type": "",
              "latitude": "",
              "longitude": "",
              "is_default": false,
              "id": 0,
              "user_id": 0,
              "created_at": "",
              "updated_at": ""
            }
          ]
