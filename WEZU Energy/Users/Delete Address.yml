info:
  name: Delete Address
  type: http
  seq: 15
  tags:
    - Users

http:
  method: DELETE
  url: "{{baseUrl}}/api/v1/users/me/addresses/:address_id"
  params:
    - name: address_id
      value: ""
      type: path
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/users/me/addresses/:address_id"
      method: DELETE
      params:
        - name: address_id
          value: ""
          type: path
    response:
      status: 204
      statusText: No Content
      body:
        type: text
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/users/me/addresses/:address_id"
      method: DELETE
      params:
        - name: address_id
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

