info:
  name: Get User By Id
  type: http
  seq: 25
  tags:
    - Users

http:
  method: GET
  url: "{{baseUrl}}/api/v1/users/:user_id"
  params:
    - name: user_id
      value: ""
      type: path
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/users/:user_id"
      method: GET
      params:
        - name: user_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "full_name": "",
            "email": "",
            "phone_number": "",
            "profile_picture": "",
            "address": "",
            "is_active": false,
            "is_superuser": false,
            "kyc_status": "",
            "roles": [],
            "permissions": [],
            "wallet_balance": 0,
            "staff_assignment": "",
            "kyc_documents": [
              {
                "id": 0,
                "document_type": "",
                "document_number": "",
                "file_url": "",
                "status": "",
                "uploaded_at": ""
              }
            ],
            "activity_history": [
              {
                "action": "",
                "resource_type": "",
                "resource_id": "",
                "details": "",
                "ip_address": "",
                "timestamp": ""
              }
            ],
            "login_history": [
              {
                "ip_address": "",
                "timestamp": "",
                "details": ""
              }
            ],
            "created_at": "",
            "updated_at": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/users/:user_id"
      method: GET
      params:
        - name: user_id
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: |-
  Get user profile by ID (Admin Only).

  Authorization:
  - Super Admin: Can view all users
  - Regional Manager: Can view users in their region
  - Vendor Owner: Can view their staff only
