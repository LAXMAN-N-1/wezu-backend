info:
  name: Update Notification Preferences
  type: http
  seq: 23
  tags:
    - Users

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/users/me/notification-preferences"
  body:
    type: json
    data: |-
      {
        "email": "",
        "sms": "",
        "push": "",
        "quiet_hours": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/users/me/notification-preferences"
      method: PUT
      body:
        type: json
        data: |-
          {
            "email": "",
            "sms": "",
            "push": "",
            "quiet_hours": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "email": {
              "enabled": false,
              "rental_confirmations": false,
              "payment_receipts": false,
              "promotional": false,
              "security_alerts": false
            },
            "sms": {
              "enabled": false,
              "rental_confirmations": false,
              "payment_receipts": false,
              "otp": false
            },
            "push": {
              "enabled": false,
              "battery_available": false,
              "payment_reminders": false,
              "promotional": false
            },
            "quiet_hours": {
              "enabled": false,
              "start_time": "",
              "end_time": "",
              "timezone": ""
            }
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/users/me/notification-preferences"
      method: PUT
      body:
        type: json
        data: |-
          {
            "email": "",
            "sms": "",
            "push": "",
            "quiet_hours": ""
          }
    response:
