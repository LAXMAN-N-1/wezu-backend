info:
  name: Submit New Station
  type: http
  seq: 5
  tags:
    - Dealer_Stations

http:
  method: POST
  url: "{{baseUrl}}/api/v1/dealer-stations/new"
  body:
    type: json
    data: |-
      {
        "name": "",
        "tenant_id": "",
        "address": "",
        "city": "",
        "latitude": 0,
        "longitude": 0,
        "station_type": "",
        "total_slots": 0,
        "is_24x7": false,
        "contact_phone": "",
        "operating_hours": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/dealer-stations/new"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "tenant_id": "",
            "address": "",
            "city": "",
            "latitude": 0,
            "longitude": 0,
            "station_type": "",
            "total_slots": 0,
            "is_24x7": false,
            "contact_phone": "",
            "operating_hours": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/dealer-stations/new"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "tenant_id": "",
            "address": "",
            "city": "",
            "latitude": 0,
            "longitude": 0,
            "station_type": "",
            "total_slots": 0,
            "is_24x7": false,
            "contact_phone": "",
            "operating_hours": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: Submit a new station. Will be pending active state.
