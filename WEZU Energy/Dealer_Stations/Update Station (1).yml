info:
  name: Update Station (1)
  type: http
  seq: 3
  tags:
    - Dealer_Stations

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/dealer-stations/:station_id"
  params:
    - name: station_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "name": "",
        "address": "",
        "city": "",
        "contact_phone": "",
        "operating_hours": "",
        "is_24x7": "",
        "total_slots": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

