info:
  name: Get User Sessions
  type: http
  seq: 11
  tags:
    - Dealer_Users

http:
  method: GET
  url: "{{baseUrl}}/api/v1/dealer/portal/users/:user_id/sessions"
  params:
    - name: user_id
      value: ""
      type: path
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/dealer/portal/users/:user_id/sessions"
      method: GET
      params:
        - name: user_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 0,
              "device_type": "",
              "user_agent": "",
              "ip_address": "",
              "location": "",
              "is_active": false,
              "created_at": "",
              "last_active_at": ""
            }
          ]
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/dealer/portal/users/:user_id/sessions"
      method: GET
      params:
        - name: user_id
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
