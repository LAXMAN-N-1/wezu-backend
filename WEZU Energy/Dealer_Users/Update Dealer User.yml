info:
  name: Update Dealer User
  type: http
  seq: 6
  tags:
    - Dealer_Users

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/dealer/portal/users/:user_id"
  params:
    - name: user_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "full_name": "",
        "email": "",
        "phone_number": "",
        "department": "",
        "notes": "",
        "role_id": "",
        "station_id": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/dealer/portal/users/:user_id"
      method: PUT
      params:
        - name: user_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "full_name": "",
            "email": "",
            "phone_number": "",
            "department": "",
            "notes": "",
            "role_id": "",
            "station_id": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "full_name": "",
            "email": "",
            "phone_number": "",
            "department": "",
            "profile_picture": "",
            "status": "",
            "role_id": "",
            "role_name": "",
            "role_icon": "",
            "role_color": "",
            "station_id": "",
            "last_login": "",
            "created_at": "",
            "created_by": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/dealer/portal/users/:user_id"
      method: PUT
      params:
        - name: user_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
