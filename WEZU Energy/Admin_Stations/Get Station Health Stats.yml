info:
  name: Get Station Health Stats
  type: http
  seq: 1
  tags:
    - Admin_Stations

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/stations/health"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/stations/health"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "stations": [
              {
                "station_id": "",
                "status": "",
                "last_heartbeat": "",
                "uptime_percentage": 0,
                "avg_response_time": 0,
                "total_downtime_minutes": 0
              }
            ]
          }

docs: Get real-time health statistics for all stations.
