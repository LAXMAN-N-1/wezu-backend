info:
  name: Refresh Token (POST)
  type: http
  seq: 5
  tags:
    - Dealer_Auth

http:
  method: POST
  url: "{{baseUrl}}/api/v1/dealer/auth/refresh"
  body:
    type: json
    data: |-
      {
        "refresh_token": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/dealer/auth/refresh"
      method: POST
      body:
        type: json
        data: |-
          {
            "refresh_token": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "access_token": "",
            "refresh_token": "",
            "token_type": "",
            "user": {
              "id": 0,
              "email": "",
              "phone_number": "",
              "full_name": "",
              "user_type": "",
              "profile_picture": "",
              "dealer_id": "",
              "business_name": "",
              "is_approved": false,
              "application_stage": ""
            }
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/dealer/auth/refresh"
      method: POST
      body:
        type: json
        data: |-
          {
            "refresh_token": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: Refresh JWT token.
