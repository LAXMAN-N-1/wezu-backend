info:
  name: Validate Invite Token
  type: http
  seq: 6
  tags:
    - Dealer_Auth

http:
  method: GET
  url: "{{baseUrl}}/api/v1/dealer/auth/validate-invite/:token"
  params:
    - name: token
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/dealer/auth/validate-invite/:token"
      method: GET
      params:
        - name: token
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/dealer/auth/validate-invite/:token"
      method: GET
      params:
        - name: token
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

