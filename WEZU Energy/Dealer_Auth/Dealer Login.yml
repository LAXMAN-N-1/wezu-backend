info:
  name: Dealer Login
  type: http
  seq: 1
  tags:
    - Dealer_Auth

http:
  method: POST
  url: "{{baseUrl}}/api/v1/dealer/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "",
        "password": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/dealer/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/dealer/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: Dealer login with email/phone + password. Supports both dealer owners and dealer staff.
