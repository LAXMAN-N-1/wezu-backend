info:
  name: Request Late Fee Waiver
  type: http
  seq: 13
  tags:
    - Rentals

http:
  method: POST
  url: "{{baseUrl}}/api/v1/rentals/:rental_id/late-fees/waiver"
  params:
    - name: rental_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "requested_waiver_amount": 0,
        "reason": "",
        "supporting_documents": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

