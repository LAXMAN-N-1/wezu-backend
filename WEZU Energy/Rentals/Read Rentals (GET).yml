info:
  name: Read Rentals (GET)
  type: http
  seq: 3
  tags:
    - Rentals

http:
  method: GET
  url: "{{baseUrl}}/api/v1/rentals/admin/all"
  params:
    - name: skip
      value: "0"
      type: query
    - name: limit
      value: "100"
      type: query
    - name: status
      value: ""
      type: query
      disabled: true
    - name: user_id
      value: ""
      type: query
      disabled: true
    - name: station_id
      value: ""
      type: query
      disabled: true
    - name: start_date
      value: ""
      type: query
      disabled: true
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

