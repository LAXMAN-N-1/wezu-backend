info:
  name: Initiate Swap
  type: http
  seq: 1
  tags:
    - Swaps

http:
  method: POST
  url: "{{baseUrl}}/api/v1/swaps/initiate"
  body:
    type: json
    data: |-
      {
        "station_id": 0,
        "old_battery_serial": ""
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/swaps/initiate"
      method: POST
      body:
        type: json
        data: |-
          {
            "station_id": 0,
            "old_battery_serial": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "status": "",
            "station_id": 0,
            "station_name": "",
            "amount": 0,
            "created_at": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/swaps/initiate"
      method: POST
      body:
        type: json
        data: |-
          {
            "station_id": 0,
            "old_battery_serial": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: User initiates a swap at a station.
