info:
  name: Ingest Telemetry
  type: http
  seq: 1
  tags:
    - Telematics

http:
  method: POST
  url: "{{baseUrl}}/api/v1/telematics/ingest"
  body:
    type: json
    data: |-
      {
        "battery_id": 0,
        "timestamp": "",
        "voltage": 0,
        "current": 0,
        "temperature": 0,
        "soc": 0,
        "soh": 0,
        "gps_latitude": "",
        "gps_longitude": "",
        "gps_altitude": "",
        "gps_speed": "",
        "error_codes": "",
        "raw_payload": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/telematics/ingest"
      method: POST
      body:
        type: json
        data: |-
          {
            "battery_id": 0,
            "timestamp": "",
            "voltage": 0,
            "current": 0,
            "temperature": 0,
            "soc": 0,
            "soh": 0,
            "gps_latitude": "",
            "gps_longitude": "",
            "gps_altitude": "",
            "gps_speed": "",
            "error_codes": "",
            "raw_payload": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "battery_id": 0,
            "timestamp": "",
            "voltage": 0,
            "current": 0,
            "temperature": 0,
            "soc": 0,
            "soh": 0,
            "gps_latitude": "",
            "gps_longitude": "",
            "gps_altitude": "",
            "gps_speed": "",
            "error_codes": "",
            "raw_payload": "",
            "received_at": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/telematics/ingest"
      method: POST
      body:
        type: json
        data: |-
          {
            "battery_id": 0,
            "timestamp": "",
            "voltage": 0,
            "current": 0,
            "temperature": 0,
            "soc": 0,
            "soh": 0,
            "gps_latitude": "",
            "gps_longitude": "",
            "gps_altitude": "",
            "gps_speed": "",
            "error_codes": "",
            "raw_payload": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: |-
  Ingest data point from IoT device.
  Updates the Battery's 'live' status and appends to time-series history.
