info:
  name: Ban User
  type: http
  seq: 3
  tags:
    - Admin_Users

http:
  method: POST
  url: "{{baseUrl}}/api/v1/admin/users/:user_id/ban"
  params:
    - name: user_id
      value: ""
      type: path
    - name: reason
      value: Violation of terms
      type: query
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/admin/users/:user_id/ban"
      method: POST
      params:
        - name: user_id
          value: ""
          type: path
        - name: reason
          value: Violation of terms
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/admin/users/:user_id/ban"
      method: POST
      params:
        - name: user_id
          value: ""
          type: path
        - name: reason
          value: Violation of terms
          type: query
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: "Admin: Ban a user (deactivate account and revoke sessions)."
