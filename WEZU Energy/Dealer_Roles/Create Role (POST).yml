info:
  name: Create Role (POST)
  type: http
  seq: 2
  tags:
    - Dealer_Roles

http:
  method: POST
  url: "{{baseUrl}}/api/v1/dealer/portal/roles"
  body:
    type: json
    data: |-
      {
        "name": "",
        "description": "",
        "icon": "",
        "color": "",
        "is_active": false,
        "permissions": []
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/dealer/portal/roles"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "description": "",
            "icon": "",
            "color": "",
            "is_active": false,
            "permissions": []
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "name": "",
            "description": "",
            "icon": "",
            "color": "",
            "is_active": false,
            "id": 0,
            "user_count": 0,
            "permission_summary": "",
            "is_system": false,
            "permissions_matrix": {},
            "created_at": "",
            "updated_at": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/dealer/portal/roles"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "description": "",
            "icon": "",
            "color": "",
            "is_active": false,
            "permissions": []
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
