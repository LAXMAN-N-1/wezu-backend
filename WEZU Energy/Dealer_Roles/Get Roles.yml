info:
  name: Get Roles
  type: http
  seq: 1
  tags:
    - Dealer_Roles

http:
  method: GET
  url: "{{baseUrl}}/api/v1/dealer/portal/roles"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/auth/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/dealer/portal/roles"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "name": "",
              "description": "",
              "icon": "",
              "color": "",
              "is_active": false,
              "id": 0,
              "user_count": 0,
              "permission_summary": "",
              "is_system": false,
              "permissions_matrix": {},
              "created_at": "",
              "updated_at": ""
            }
          ]

docs: List all available roles for the dealer (system roles + custom dealer roles).
