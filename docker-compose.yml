services:
  # The WEZU Backend Application
  api:
    build: .
    restart: "on-failure:5"
    init: true
    stop_grace_period: 30s
    cpus: "0.75"
    mem_limit: 512m
    expose:
      - "8000"
    # In Coolify/production, inject env vars from platform UI.
    # Keep compose free of fixed DATABASE_URL so external Neon DB is authoritative.
    environment:
      # Keep DATABASE_URL / REDIS_URL out of compose-level environment
      # so platforms like Coolify can manage/delete them directly.
      - GUNICORN_WORKERS=2
      - GUNICORN_TIMEOUT=120
      - GUNICORN_GRACEFUL_TIMEOUT=45
      - DB_POOL_SIZE=5
      - DB_MAX_OVERFLOW=5
      - DB_POOL_TIMEOUT=30
      - DB_POOL_RECYCLE=1800
      - AUDIT_REQUEST_LOGGING_ENABLED=false
      - DB_INIT_ON_STARTUP=false
      - RUN_BACKGROUND_TASKS=false
      - SCHEDULER_ENABLED=false
      - MQTT_ENABLED=false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - wezu_net
    depends_on:
      redis:
        condition: service_healthy

  # Primary Database
  db:
    # Opt-in only for local development. Not started in normal deployments.
    profiles: ["local-db"]
    image: postgres:15-alpine
    restart: "on-failure:5"
    init: true
    cpus: "0.75"
    mem_limit: 384m
    environment:
      POSTGRES_USER: wezu
      POSTGRES_PASSWORD: wezupassword
      POSTGRES_DB: wezu_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wezu -d wezu_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - wezu_net

  # Redis for Caching and Rate Limiting
  redis:
    image: redis:7-alpine
    restart: "on-failure:5"
    init: true
    cpus: "0.25"
    mem_limit: 128m
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - wezu_net

volumes:
  postgres_data:
  redis_data:

networks:
  wezu_net:
    driver: bridge
