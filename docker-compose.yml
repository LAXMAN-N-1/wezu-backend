version: '3.8'

services:
  # The WEZU Frontend Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - wezu_net

  # The WEZU Backend Application (Scalable)
  api:
    build: .
    restart: always
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=postgresql://wezu:wezupassword@db/wezu_prod
      - REDIS_URL=redis://redis:6379/0
    deploy:
      replicas: 3 # Run 3 horizontal instances behind Nginx
    networks:
      - wezu_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # Primary Database
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: wezu
      POSTGRES_PASSWORD: wezupassword
      POSTGRES_DB: wezu_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wezu -d wezu_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wezu_net

  # Redis for Caching and Rate Limiting
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - wezu_net

volumes:
  postgres_data:
  redis_data:

networks:
  wezu_net:
    driver: bridge
