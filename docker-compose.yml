services:
  # The WEZU Backend Application
  api:
    build: .
    restart: "on-failure:5"
    init: true
    stop_grace_period: 30s
    mem_limit: 1024m
    memswap_limit: 1024m
    expose:
      - "8000"
    # In Coolify/production, inject env vars from platform UI.
    # Keep compose free of fixed DATABASE_URL so external Neon DB is authoritative.
    environment:
      # Keep DATABASE_URL / REDIS_URL out of compose-level environment
      # so platforms like Coolify can manage/delete them directly.
      - GUNICORN_WORKERS=2
      - GUNICORN_TIMEOUT=120
      - GUNICORN_GRACEFUL_TIMEOUT=45
      - DB_POOL_SIZE=10
      - DB_MAX_OVERFLOW=5
      - DB_POOL_TIMEOUT=30
      - DB_POOL_RECYCLE=1800
      - AUDIT_REQUEST_LOGGING_ENABLED=true
      - AUDIT_REQUEST_QUEUE_MAXSIZE=2000
      - AUDIT_REQUEST_BATCH_SIZE=50
      - AUDIT_REQUEST_FLUSH_MS=500
      - AUDIT_REQUEST_DROP_WARN_EVERY=100
      - AUDIT_REQUEST_WORKERS=1
      - DB_INIT_ON_STARTUP=false
      - RUN_BACKGROUND_TASKS=false
      - SCHEDULER_ENABLED=false
      - MQTT_ENABLED=false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/live', timeout=2)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - wezu_net
    depends_on:
      redis:
        condition: service_healthy

  # Primary Database
  db:
    # Opt-in only for local development. Not started in normal deployments.
    profiles: ["local-db", "v2"]
    image: postgres:15-alpine
    restart: "on-failure:5"
    init: true
    mem_limit: 256m
    memswap_limit: 256m
    environment:
      POSTGRES_USER: wezu
      POSTGRES_PASSWORD: wezupassword
      POSTGRES_DB: wezu_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wezu -d wezu_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - wezu_net

  # Redis for Caching and Rate Limiting
  redis:
    image: redis:7-alpine
    restart: "on-failure:5"
    init: true
    mem_limit: 128m
    memswap_limit: 128m
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - wezu_net

  # Go-based v2 API rewrite (optional profile)
  api-v2:
    profiles: ["v2"]
    build:
      context: ./v2
      dockerfile: Dockerfile
    restart: "on-failure:5"
    init: true
    stop_grace_period: 30s
    mem_limit: 1024m
    memswap_limit: 1024m
    expose:
      - "8081"
    environment:
      - SERVICE_NAME=wezu-api-v2
      - ENVIRONMENT=development
      - HTTP_ADDR=:8081
      - DATABASE_URL=${DATABASE_URL:-postgresql://wezu:wezupassword@db:5432/wezu_prod}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-change-me-access-secret}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      - OTEL_ENABLED=false
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - wezu_net
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  wezu_net:
    driver: bridge
